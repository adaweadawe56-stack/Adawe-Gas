<!DOCTYPE html>
<html lang="en">
<head>

<style>
body{margin:0;background:#f7f9fb;font-family:Arial}

.navbar-brand{color:white!important}
.table-striped th { background:#198754; color:white; }
.pending{background:#fff3cd}
.processing{background:#cfe2ff}
.completed{background:#d1e7dd}

.rejected{background:#f8d7da}

</style>
</head>

<body>

<nav class="navbar">
<div class="container">
<a class="navbar-brand">Adawe Gas Admin</a>
</div>
</nav>

<div id="loginPage" class="container mt-5" style="max-width:400px;">
<h3>Admin Login</h3>
<input id="email" class="form-control mb-2" placeholder="Email">
<input id="password" type="password" class="form-control mb-2" placeholder="Password">
<button onclick="login()" class="btn btn-success w-100">Login</button>

</div>

<div id="dashboard" style="display:none;" class="container mt-4">

<div class="row text-center">
<div class="col-md-3"><div class="stat-box"><h4 id="totalOrders">0</h4><p>Total Orders</p></div></div>
<div class="col-md-3"><div class="stat-box"><h4 id="pendingOrders">0</h4><p>Pending Orders</p></div></div>
<div class="col-md-3"><div class="stat-box"><h4 id="todayOrders">0</h4><p>Today's Orders</p></div></div>
<div class="col-md-3"><div class="stat-box"><h4 id="totalRevenue">0</h4><p>Total Revenue (KES)</p></div></div>
</div>

<canvas id="salesChart"></canvas>
</div>

<h3>Orders</h3>
<input id="searchOrders" class="form-control mb-2" placeholder="Search Orders...">

<select id="statusFilter" class="form-select mb-2">
<option value="">All Status</option>
<option value="Pending">Pending</option>
<option value="Processing">Processing</option>
<option value="Completed">Completed</option>
</select>

<table id="ordersTable" class="table table-striped"></table>

<h3 class="mt-4">Sellers</h3>

</div>

<!-- 🔥 MODAL -->
<div class="modal fade" id="priceModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Seller Prices</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <table class="table table-bordered">
          <tr>
            <th>Size</th>
            <th>Price</th>
          </tr>

          <tbody id="priceModalBody"></tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot,
doc,
updateDoc,
deleteDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVhASqIXG5OaVk1nr8c3hZ-_liTg1UIsw",
  authDomain: "adawe-gas-system-82187.firebaseapp.com",
  projectId: "adawe-gas-system-82187",
  storageBucket: "adawe-gas-system-82187.appspot.com",
  messagingSenderId: "644303663526",
  appId: "1:644303663526:web:bacf9e5db0d7787f705f67"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let ordersData = [];
let sellersData = [];
let chart;

function formatDate(ts){

 if(!ts) return "";

 const d = ts.toDate ? ts.toDate() : new Date(ts);

 return d.toLocaleString();
}

window.login = async function(){

 try{

  const emailValue = document.getElementById("email").value;
  const passwordValue = document.getElementById("password").value;

  const userCredential = await signInWithEmailAndPassword(
    auth,
    emailValue,
    passwordValue
  );

  const uid = userCredential.user.uid;

  const adminDoc = await getDoc(doc(db,"admins",uid));

  if(!adminDoc.exists()){

    loginError.innerText = "Not admin";

    return;
  }

  loginPage.style.display = "none";

  dashboard.style.display = "block";

  startRealtime();

 }catch(err){

  console.error(err);

  loginError.innerText = err.message;
 }
};

function startRealtime(){

onSnapshot(

  collection(db,"orders"),

  snap => {

    console.log("Orders Found:", snap.size);

    ordersData = [];

    snap.forEach(d=>{

      const order = {
        id:d.id,
        ...d.data()
      };

      ordersData.push(order);

      if(!order.sellerName){

        autoAssignSeller(order);

      }

    });

    renderOrders();

    updateStatsAndChart();

  },

  error => {

    console.error(
      "Orders Error:",
      error.code,
      error.message
    );

  }

);

onSnapshot(

  collection(db,"sellers"),

  snap => {

    sellersData = [];

    snap.forEach(d=>{

      sellersData.push({
        id:d.id,
        ...d.data()
      });

    });

    renderSellers();

  },

  error => {

    console.error(
      "Sellers Error:",
      error.code,
      error.message
    );

  }

);
}
async function autoAssignSeller(order){

 if(!order.quantity) return;

 let bestSeller = null;
 let bestPrice = Infinity;

 sellersData.forEach(s=>{

   // Approved sellers only
   if((s.status || "").toLowerCase() !== "approved"){
     return;
   }

   // Must have prices
   if(!s.prices || !s.prices[order.quantity]){
     return;
   }

   const sellerPrice =
   Number(s.prices[order.quantity]);

   // Skip invalid prices
   if(sellerPrice <= 0){
     return;
   }

   // Find cheapest seller
   if(sellerPrice < bestPrice){

     bestPrice = sellerPrice;

     bestSeller = s;
   }

 });

 // Auto assign seller
 if(bestSeller){

await updateDoc(doc(db,"orders",order.id),{

  sellerUid: bestSeller.uid,

  sellerName: bestSeller.name,

  sellerPhone: bestSeller.phone,

  sellerLocation: bestSeller.location,

  price: bestPrice,

  status: "Processing",

  assignedAt: new Date().toISOString()

});

   console.log(
     "Seller auto assigned:",
     bestSeller.name
   );
 }
}

function updateStatsAndChart(){

 let total = 0;

 let pending = 0;

 let today = 0;

 let revenue = 0;

 const todayDate = new Date().toDateString();

 let dailyMap = {};

 ordersData.forEach(o=>{

  total++;

  if((o.status || "Pending") === "Pending"){

    pending++;
  }

  if(o.price){

    revenue += o.price;
  }

  if(o.createdAt){

    const d = o.createdAt.toDate();

    if(d.toDateString() === todayDate){

      today++;
    }

    const day = d.toLocaleDateString();

    dailyMap[day] = (dailyMap[day] || 0) + 1;
  }

 });

 totalOrders.innerText = total;

 pendingOrders.innerText = pending;

 todayOrders.innerText = today;

 totalRevenue.innerText = revenue;

 if(chart){

  chart.destroy();
 }

 const salesCanvas = document.getElementById("salesChart");

 if(!salesCanvas) return;

 chart = new Chart(salesCanvas,{

  type:"line",

  data:{

    labels:Object.keys(dailyMap),

    datasets:[{

      label:"Orders per Day",

      data:Object.values(dailyMap)

    }]
  }

 });

}

function renderOrders(){

  ordersTable.innerHTML = `
    <tr>
      <th>Name</th>
      <th>Phone</th>
      <th>Location</th>
      <th>Qty</th>
      <th>Brand</th>
      <th>Status</th>
      <th>Date</th>
      <th>Actions</th>
    </tr>
  `;

  ordersData.forEach(o=>{

    const date =
      o.createdAt
      ? o.createdAt.toDate().toLocaleString()
      : "-";

    ordersTable.innerHTML += `
      <tr>
        <td>${o.name}</td>
        <td>${o.phone}</td>
        <td>${o.location || "-"}</td>
        <td>${o.quantity}</td>
        <td>${o.brand}</td>
        <td>${o.status}</td>
        <td>${date}</td>

       <td>

${
o.customerLatitude && o.customerLongitude
? `
<button
onclick="window.open('https://maps.google.com/?q=${o.customerLatitude},${o.customerLongitude}','_blank')"
class="btn btn-success btn-sm">
📍 Map
</button>
`
: ""
}

<button
onclick="editOrder('${o.id}')"
class="btn btn-primary btn-sm mt-1">
Edit
</button>

<button
onclick="deleteOrder('${o.id}')"
class="btn btn-danger btn-sm mt-1">
Delete
</button>

</td>

      </tr>
    `;

  });

}
function renderSellers(){

 sellersTable.innerHTML = `
 <tr>
 <th>Name</th>
 <th>Phone</th>
 <th>Location</th>
 <th>Status</th>
 <th>Date</th>
 <th>Actions</th>
 </tr>`;

 sellersData.forEach(s=>{

  sellersTable.innerHTML += `
  <tr>

  <td>${s.name || ""}</td>

  <td>${s.phone || ""}</td>

  <td>${s.location || ""}</td>

  <td>${s.status || "pending"}</td>

  <td>${formatDate(s.createdAt)}</td>

 <td>

<button onclick="showPrices('${s.id}')" class="btn btn-info btn-sm">
Prices
</button>

<button onclick="editSeller('${s.id}')" class="btn btn-primary btn-sm mt-1">
Edit
</button>

<button onclick="approveSeller('${s.id}')" class="btn btn-success btn-sm mt-1">
Approve
</button>

<button onclick="rejectSeller('${s.id}')" class="btn btn-warning btn-sm mt-1">
Reject
</button>

<button onclick="deleteSeller('${s.id}')" class="btn btn-danger btn-sm mt-1">
Delete
</button>

</td>
  </tr>`;
 });

}

window.showPrices = function(id){

 const s = sellersData.find(x=>x.id==id);

 const body = document.getElementById("priceModalBody");

 body.innerHTML = "";

 const sizes = [
 "1kg",
 "3kg",
 "6kg",
 "13kg",
 "15kg",
 "22kg",
 "25kg",
 "35kg",
 "40kg",
 "45kg",
 "50kg"
 ];

 sizes.forEach(size=>{

  body.innerHTML += `
  <tr>
  <td>${size}</td>
  <td>${s.prices?.[size] || ""}</td>
  </tr>`;
 });

 new bootstrap.Modal(document.getElementById("priceModal")).show();

};

window.deleteOrder = async id => {

  if (!confirm("Delete this order?")) return;

  try {

    await deleteDoc(doc(db,"orders",id));

    alert("Order deleted successfully");

  } catch (error) {

    console.error(error);

    alert("Failed to delete order");

  }

};

window.deleteSeller = async id => {

  if (!confirm("Delete this seller?")) return;

  try {

    await deleteDoc(doc(db,"sellers",id));

    alert("Seller deleted successfully");

  } catch (error) {

    console.error(error);

    alert("Failed to delete seller");

  }

};

window.editSeller = async function(id){

const sellerRef =
doc(db,"sellers",id);

const sellerSnap =
await getDoc(sellerRef);

if(!sellerSnap.exists()) return;

const seller =
sellerSnap.data();

  document.getElementById(
"editSellerName"
).value =
seller.name || "";

document.getElementById(
"editSellerPhone"
).value =
seller.phone || "";

document.getElementById(
"editSellerLocation"
).value =
seller.location || "";

document.getElementById(
"editPaymentStatus"
).value =
seller.paymentStatus || "Paid";

document.getElementById(
"editDeliveryLimit"
).value =
seller.deliveryLimit || 3;

document.getElementById(
"editSellerId"
).value=id;

document
.querySelectorAll(".edit-brand")
.forEach(cb=>{

cb.checked=false;

if(
seller.brands &&
seller.brands.includes(cb.value)
){
cb.checked=true;
}

});

  const sizes = [

"1kg",

"3kg",

"6kg",

"13kg",

"15kg",

"22kg",

"25kg",

"35kg",

"40kg",

"45kg",

"50kg"

];

const rows =
document.getElementById(
"editPriceRows"
);

rows.innerHTML = "";

sizes.forEach(size=>{

rows.innerHTML += `

<div class="mb-2">

<label>${size}</label>

<input

type="number"

class="form-control edit-price"

data-size="${size}"

value="${seller.prices?.[size] || 0}">

</div>

`;

});

new bootstrap.Modal(
document.getElementById("editSellerModal")
).show();

}

window.saveSeller =
async function(){

const id =
document.getElementById(
"editSellerId"
).value;

const name =
document.getElementById(
"editSellerName"
).value;

const phone =
document.getElementById(
"editSellerPhone"
).value;

const location =
document.getElementById(
"editSellerLocation"
).value;

const paymentStatus =
document.getElementById(
"editPaymentStatus"
).value;

const deliveryLimit =
Number(
document.getElementById(
"editDeliveryLimit"
).value
);

const prices = {};

document
.querySelectorAll(".edit-price")
.forEach(input=>{

    prices[input.dataset.size] =
    Number(input.value);

});

const brands = [];

document
.querySelectorAll(".edit-brand:checked")
.forEach(cb=>{

    brands.push(cb.value);

});

await updateDoc(
doc(db,"sellers",id),
{

name,

phone,

location,

prices,

brands,

paymentStatus,

deliveryLimit

}
);

bootstrap.Modal
.getInstance(
document.getElementById(
"editSellerModal"
)
).hide();

alert("Seller updated");

loadSellers();

}
  
  
window.approveSeller = async id => {

  if (!confirm("Approve this seller?")) return;

  try {

    await updateDoc(doc(db,"sellers",id),{
      status:"approved"
    });

    alert("Seller approved successfully");

  } catch(error) {

    console.error(error);

    alert("Failed to approve seller");

  }

};

window.rejectSeller = async id => {

  if (!confirm("Reject this seller?")) return;

  try {

    await updateDoc(doc(db,"sellers",id),{
      status:"rejected"
    });

    alert("Seller rejected successfully");

  } catch(error) {

    console.error(error);

    alert("Failed to reject seller");

  }

};

window.editOrder = async id => {

  const o = ordersData.find(x => x.id == id);

  const name = prompt("Name", o.name);

  if (!name) return;

  try {

    await updateDoc(doc(db,"orders",id),{
      name
    });

    alert("Order updated successfully");

  } catch(error) {

    console.error(error);

    alert("Failed to update order");

  }

};

</script>
