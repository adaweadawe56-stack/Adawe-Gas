<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adawe Gas Control Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { font-family: Arial; background:#f5f5f5; }
header { background:#0f7b3f; color:white; text-align:center; padding:20px; font-size:1.8em; font-weight:bold; }
.section { padding:40px 20px; }
h3 { margin-top:30px; }
table { width:100%; border-collapse: collapse; margin-top:15px; }
th, td { border:1px solid #ccc; padding:8px; text-align:left; }
th { background:#198754; color:white; }
.stats { display:flex; gap:20px; margin-top:20px; }
.stat-box { background:white; padding:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); flex:1; text-align:center; }
.btn-sm { font-size:.75rem; padding:.25rem .5rem; }
.btn-danger { background:#dc3545; color:white; }
.search-input { margin-bottom:10px; width:100%; padding:6px 8px; }
</style>
</head>

<body>
  
<div id="loginPage" class="container mt-5" style="max-width:400px;">
  <h3 class="text-center mb-3">Admin Login</h3>
  <input id="email" type="email" class="form-control mb-2" placeholder="Email">
  <input id="password" type="password" class="form-control mb-2" placeholder="Password">
  <button onclick="login()" class="btn btn-success w-100">Login</button>
  <p id="loginError" style="color:red;"></p>
</div>

<div id="dashboard" style="display:none;">
  <header>Adawe Gas Control</header>

  <div class="section">
    <div class="stats">
      <div class="stat-box">
        <h4 id="totalOrders">0</h4>
        <p>Total Orders</p>
      </div>
      <div class="stat-box">
        <h4 id="pendingOrders">0</h4>
        <p>Pending Orders</p>
      </div>
    </div>

    <h3>Orders</h3>
    <input type="text" id="searchOrders" class="search-input" placeholder="Search Orders...">
    <table id="ordersTable"></table>

    <h3>Sellers</h3>
    <input type="text" id="searchSellers" class="search-input" placeholder="Search Sellers...">
    <table id="sellersTable"></table>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVhASqIXG5OaVk1nr8c3hZ-_liTg1UIsw",
  authDomain: "adawe-gas-system-82187.firebaseapp.com",
  projectId: "adawe-gas-system-82187",
  storageBucket: "adawe-gas-system-82187.appspot.com",
  messagingSenderId: "644303663526",
  appId: "1:644303663526:web:bacf9e5db0d7787f705f67"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentAdminRole = null;
let ordersData = [], sellersData = [];

// AUTO ADMIN
const adminEmail = "adaweadawe56@gmail.com";

async function addAdminIfNotExists() {
  const snapshot = await getDocs(collection(db,"admins"));
  let exists = false;
  snapshot.forEach(docSnap=>{
    if(docSnap.data().email.toLowerCase() === adminEmail.toLowerCase()) exists = true;
  });
  if(!exists){
    await addDoc(collection(db,"admins"),{email: adminEmail, role: "super"});
  }
}
addAdminIfNotExists();

// AUTO FIX SELLERS (🔥 muhiim)
async function fixSellers(){
  const snapshot = await getDocs(collection(db,"sellers"));

  snapshot.forEach(async(docSnap)=>{
    const s = docSnap.data();

    await updateDoc(doc(db,"sellers",docSnap.id),{
      location: s.location || s.Location || "Nairobi",
      phone: s.phone || s.Phone || "0700000000"
    });
  });

  console.log("Sellers fixed ✅");
}

// ADMIN CHECK
async function checkAdminAccess(user){
  const snapshot = await getDocs(collection(db,"admins"));
  let found = false;
  snapshot.forEach(docSnap=>{
    if(docSnap.data().email.toLowerCase() === user.email.toLowerCase()){
      found = true;
      currentAdminRole = docSnap.data().role;
    }
  });
  if(!found){ alert("Not authorized"); location.reload(); }
}

// LOGIN
window.login = function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth,email,password)
  .then(async(res)=>{
    await checkAdminAccess(res.user);
    await fixSellers(); // 🔥 AUTO FIX RUN
    document.getElementById("loginPage").style.display="none";
    document.getElementById("dashboard").style.display="block";
    startRealtime();
  })
  .catch(()=>{
    document.getElementById("loginError").innerText="Login failed";
  });
}

// REALTIME
function startRealtime(){

onSnapshot(collection(db,"orders"), snapshot=>{
  ordersData = [];
  snapshot.forEach(docSnap=> ordersData.push({id: docSnap.id, ...docSnap.data()}));
  renderOrdersTable();
});

onSnapshot(collection(db,"sellers"), snapshot=>{
  sellersData = [];
  snapshot.forEach(docSnap=> sellersData.push({id: docSnap.id, ...docSnap.data()}));
  renderSellersTable();
});

}

// ORDERS
function renderOrdersTable(filter=""){
  const table=document.getElementById("ordersTable");

  table.innerHTML=`
    <tr>
      <th>Name</th><th>Phone</th><th>Location</th><th>Brand</th>
      <th>Quantity</th><th>Status</th><th>Actions</th>
    </tr>
  `;

  let total=0,pending=0;

  ordersData.forEach(o=>{
    if(filter && !JSON.stringify(o).toLowerCase().includes(filter.toLowerCase())) return;

    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${o.name||"-"}</td>
      <td>${o.phone||"-"}</td>
      <td>${o.location||"-"}</td>
      <td>${o.brand||"-"}</td>
      <td>${o.quantity||"-"}</td>
      <td>${o.status||"Pending"}</td>
      <td>
        ${(o.status||"Pending")==="Pending" ? `<button class="btn btn-sm btn-success deliver">Delivered</button>`:"Delivered"}
        <button class="btn btn-sm btn-danger delete">Delete</button>
      </td>
    `;

    table.appendChild(tr);

    if((o.status||"Pending")==="Pending"){
      tr.querySelector(".deliver").onclick=async()=>{
        await updateDoc(doc(db,"orders",o.id),{status:"Delivered"});
      };
    }

    tr.querySelector(".delete").onclick=async()=>{
      if(currentAdminRole!=="super"){ alert("Only Super Admin"); return; }
      if(confirm("Delete order?")) await deleteDoc(doc(db,"orders",o.id));
    };

    total++;
    if((o.status||"Pending")==="Pending") pending++;
  });

  document.getElementById("totalOrders").innerText=total;
  document.getElementById("pendingOrders").innerText=pending;
}

// SELLERS
function renderSellersTable(filter=""){
  const table=document.getElementById("sellersTable");

  table.innerHTML=`
    <tr>
      <th>Company</th><th>Location</th><th>Phone</th>
      <th>6kg</th><th>13kg</th><th>Type</th><th>Actions</th>
    </tr>
  `;

  sellersData.forEach(s=>{
    if(filter && !JSON.stringify(s).toLowerCase().includes(filter.toLowerCase())) return;

    const tr=document.createElement("tr");

    tr.innerHTML=`
      <td>${s.name||"-"}</td>
      <td>${s.location||"-"}</td>
      <td>${s.phone||"-"}</td>
      <td>${s.price6||"-"}</td>
      <td>${s.price13||"-"}</td>
      <td>${s.businessType||"-"}</td>
      <td><button class="btn btn-sm btn-danger delete">Delete</button></td>
    `;

    table.appendChild(tr);

    tr.querySelector(".delete").onclick=async()=>{
      if(currentAdminRole!=="super"){ alert("Only Super Admin"); return; }
      if(confirm("Delete seller?")) await deleteDoc(doc(db,"sellers",s.id));
    };
  });
}

// SEARCH
document.getElementById("searchOrders").addEventListener("input",(e)=> renderOrdersTable(e.target.value));
document.getElementById("searchSellers").addEventListener("input",(e)=> renderSellersTable(e.target.value));

</script>

</body>
</html>
