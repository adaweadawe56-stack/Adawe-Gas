<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adawe Gas Control Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { font-family: Arial; background:#f5f5f5; }
header { background:#0f7b3f; color:white; text-align:center; padding:20px; font-size:1.8em; font-weight:bold; }
.section { padding:40px 20px; }
h3 { margin-top:30px; }
table { width:100%; border-collapse: collapse; margin-top:15px; }
th, td { border:1px solid #ccc; padding:8px; text-align:left; }
th { background:#198754; color:white; }
.stats { display:flex; gap:20px; margin-top:20px; }
.stat-box { background:white; padding:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); flex:1; text-align:center; }
</style>
</head>

<body>

<header>Adawe Gas Control</header>

<section class="section">
<h2>Live Dashboard</h2>

<div class="stats">
<div class="stat-box">
<h4>Total Orders</h4>
<p id="totalOrders">0</p>
</div>
<div class="stat-box">
<h4>Pending Orders</h4>
<p id="pendingOrders">0</p>
</div>
<div class="stat-box">
<h4>Active Partners</h4>
<p id="activePartners">0</p>
</div>
</div>

<h3>Orders</h3>
<table id="ordersTable">
<tr>
<th>Name</th>
<th>Location</th>
<th>Brand</th>
<th>Quantity</th>
<th>Unit</th>
<th>Status</th>
</tr>
</table>

<h3>Partners</h3>
<table id="partnersTable">
<tr>
<th>Name</th>
<th>Location</th>
<th>Phone</th>
<th>Business Type</th>
</tr>
</table>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase config (sax u gel API key)
const firebaseConfig = {
  apiKey: "AIzaSyBVhASqIXG5OaVk1nr8c3hZ-_liTg1UIsw",
  authDomain: "adawe-gas-system-82187.firebaseapp.com",
  projectId: "adawe-gas-system-82187",
  storageBucket: "adawe-gas-system-82187.appspot.com",
  messagingSenderId: "644303663526",
  appId: "1:644303663526:web:bacf9e5db0d7787f705f67"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function fetchDashboard() {
  // ===== Orders =====
  const ordersSnap = await getDocs(query(collection(db, "orders"), orderBy("createdAt", "desc")));
  const ordersTable = document.getElementById("ordersTable");
  // Clear previous rows except header
  ordersTable.innerHTML = `<tr>
<th>Name</th><th>Location</th><th>Brand</th><th>Quantity</th><th>Unit</th><th>Status</th>
</tr>`;

  let totalOrders = 0, pendingOrders = 0;
  ordersSnap.forEach(doc => {
    const o = doc.data();
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${o.name}</td>
                    <td>${o.location}</td>
                    <td>${o.brand}</td>
                    <td>${o.quantity}</td>
                    <td>${o.unit || ""}</td>
                    <td>${o.status || "Pending"}</td>`;
    ordersTable.appendChild(tr);
    totalOrders++;
    if((o.status || "Pending") === "Pending") pendingOrders++;
  });

  document.getElementById("totalOrders").textContent = totalOrders;
  document.getElementById("pendingOrders").textContent = pendingOrders;

  // ===== Partners =====
  const partnersSnap = await getDocs(collection(db, "partners"));
  const partnersTable = document.getElementById("partnersTable");
  partnersTable.innerHTML = `<tr>
<th>Name</th><th>Location</th><th>Phone</th><th>Business Type</th>
</tr>`;

  partnersSnap.forEach(doc => {
    const p = doc.data();
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${p.name}</td><td>${p.location}</td><td>${p.phone}</td><td>${p.businessType}</td>`;
    partnersTable.appendChild(tr);
  });

  document.getElementById("activePartners").textContent = partnersSnap.size;
}

// Initial fetch
fetchDashboard();

// Auto refresh every 10s
setInterval(fetchDashboard, 10000);
</script>

</body>
</html>
