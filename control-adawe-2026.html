<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adawe Gas Admin Dashboard PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
*{font-family:'Poppins',sans-serif}
body{margin:0;background:#f7f9fb}
.navbar{background:#0b7a3c}
.navbar-brand,.nav-link{color:white!important}
header { background:#0f7b3f; color:white; text-align:center; padding:20px; font-size:1.8em; font-weight:bold; }
.stats { display:flex; gap:20px; margin-top:20px; }
.stat-box { background:white; padding:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); flex:1; text-align:center; }
.table-striped th { background:#198754; color:white; }
.table-striped td.pending{background:#f8d7da;}
.table-striped td.approved{background:#d4edda;}
.table-striped td.rejected{background:#e2e3e5;}
.search-input { margin-bottom:10px; width:100%; padding:6px 8px; }
#map{height:400px;border-radius:20px;}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand">Adawe Gas Admin PRO</a>
</div>
</nav>

<div id="loginPage" class="container mt-5" style="max-width:400px;">
  <h3 class="text-center mb-3">Admin Login</h3>
  <input id="email" type="email" class="form-control mb-2" placeholder="Email">
  <input id="password" type="password" class="form-control mb-2" placeholder="Password">
  <button onclick="login()" class="btn btn-success w-100">Login</button>
  <p id="loginError" style="color:red;"></p>
</div>

<div id="dashboard" style="display:none;">
<header>
  Adawe Gas Control PRO
  <span id="pendingCount" style="background:#dc3545;color:white;padding:3px 8px;border-radius:50%;margin-left:10px;">0</span>
</header>

<div class="container section">
<div class="stats">
  <div class="stat-box"><h4 id="totalOrders">0</h4><p>Total Orders</p></div>
  <div class="stat-box"><h4 id="pendingOrders">0</h4><p>Pending Orders</p></div>
  <div class="stat-box"><h4 id="todayOrders">0</h4><p>Today's Orders</p></div>
  <div class="stat-box"><h4 id="totalIncome">0</h4><p>Total Income</p></div>
</div>

<h3 class="mt-4">Orders</h3>
<input type="text" id="searchOrders" class="search-input" placeholder="Search Orders...">
<select id="filterOrdersDate" class="form-select mb-3">
  <option value="all">All</option>
  <option value="today">Today</option>
  <option value="yesterday">Yesterday</option>
  <option value="lastWeek">Last Week</option>
  <option value="lastMonth">Last Month</option>
</select>
<table id="ordersTable" class="table table-striped"></table>

<h3 class="mt-4">Sellers</h3>
<input type="text" id="searchSellers" class="search-input" placeholder="Search Sellers...">
<select id="filterSellersDate" class="form-select mb-3">
  <option value="all">All</option>
  <option value="today">Today</option>
  <option value="yesterday">Yesterday</option>
  <option value="lastWeek">Last Week</option>
  <option value="lastMonth">Last Month</option>
</select>
<select id="filterStatus" class="form-select mb-3">
  <option value="">All Status</option>
  <option value="pending">Pending</option>
  <option value="approved">Approved</option>
  <option value="rejected">Rejected</option>
</select>

<button class="btn btn-info mb-3" onclick="showTop10Cheapest()">Top 10 Cheapest Sellers</button>
<table id="sellersTable" class="table table-striped"></table>

<div class="mt-3 text-center">
  <button class="btn btn-warning" onclick="showNearestSeller()">Show Nearest Seller</button>
  <p id="nearestSellerInfo" class="mt-2 fw-bold"></p>
</div>

<h3 class="mt-4">📍 Sellers Map</h3>
<div id="map"></div>
</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// Firebase config
const app = initializeApp({apiKey:"AIzaSy...",projectId:"adawe-gas-system-82187"});
const db = getFirestore(app);
const auth = getAuth(app);

let ordersData=[], sellersData=[], map, markers=[];
let unsubOrders=null, unsubSellers=null;

const safe=v=>v ?? "";
const lower=v=>(v||"").toLowerCase();

// FORMAT DATE
function formatDateTime(ts){
  const d=ts?.toDate?ts.toDate():new Date(ts||Date.now());
  return d.toLocaleDateString()+" "+d.toLocaleTimeString();
}

// CHECK TODAY
function isToday(ts){
  const d=ts?.toDate?ts.toDate():new Date();
  return d.toDateString()===new Date().toDateString();
}

// DATE FILTER
function checkDate(ts,filter){
  const d=ts?.toDate?ts.toDate():new Date();
  const now=new Date();
  if(filter==="today") return d.toDateString()===now.toDateString();
  if(filter==="yesterday"){ const y=new Date(); y.setDate(now.getDate()-1); return d.toDateString()===y.toDateString(); }
  if(filter==="lastWeek"){ const w=new Date(); w.setDate(now.getDate()-7); return d>=w; }
  if(filter==="lastMonth"){ const m=new Date(); m.setMonth(now.getMonth()-1); return d>=m; }
  return true;
}

// MAP INIT
function initMap(){
  if(map) return;
  map=L.map('map').setView([-1.28,36.81],10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

// LOGIN
const admins = ["admin@adawe.com"];
window.login=function(){
  loginError.innerText="";
  if(!admins.includes(email.value)){
    loginError.innerText="Not authorized";
    return;
  }

  signInWithEmailAndPassword(auth,email.value,password.value)
  .then(()=>{
    loginPage.style.display="none";
    dashboard.style.display="block";
    initMap();
    startRealtime();
  })
  .catch((err)=>{
    console.error(err);
    loginError.innerText = err.message;
  });
}

// REALTIME
function startRealtime(){
  if(unsubOrders) unsubOrders();
  if(unsubSellers) unsubSellers();

  unsubOrders = onSnapshot(collection(db,"orders"), snap=>{
    ordersData=[];
    snap.forEach(d=>ordersData.push({id:d.id,...d.data()}));

    totalOrders.innerText=ordersData.length;
    pendingOrders.innerText=ordersData.filter(o=>lower(o.status)=="pending").length;
    todayOrders.innerText=ordersData.filter(o=>isToday(o.createdAt)).length;
    totalIncome.innerText=ordersData.reduce((sum,o)=>sum+(parseInt(o.quantity)||0)*10,0);

    renderOrdersTable();
  });

  unsubSellers = onSnapshot(collection(db,"sellers"), snap=>{
    sellersData=[];
    let p=0;
    snap.forEach(d=>{
      const s={id:d.id,...d.data()};
      sellersData.push(s);
      if(lower(s.status)=="pending") p++;
    });
    pendingCount.innerText=p;
    renderSellersTable();
  });
}

// RENDER ORDERS
function renderOrdersTable(){
  const q=lower(searchOrders.value);
  const filter=filterOrdersDate.value;

  ordersTable.innerHTML=`<tr><th>Name</th><th>Phone</th><th>Location</th><th>Brand</th><th>Qty</th><th>Status</th><th>Date</th><th>Actions</th></tr>`;

  const filtered=ordersData.filter(o=>(lower(o.name||"").includes(q)||safe(o.phone).includes(q))&&checkDate(o.createdAt,filter));

  if(filtered.length===0){ ordersTable.innerHTML+=`<tr><td colspan="8">No Orders</td></tr>`; return; }

  filtered.forEach(o=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${safe(o.name)}</td>
      <td>${safe(o.phone)}</td>
      <td>${safe(o.location)}</td>
      <td>${safe(o.brand)}</td>
      <td>${safe(o.quantity)}</td>
      <td class="${lower(o.status)}">${safe(o.status)}</td>
      <td>${formatDateTime(o.createdAt)}</td>
      <td>
        <select class="form-select form-select-sm statusSelect">
          <option ${lower(o.status)=="pending"?"selected":""}>Pending</option>
          <option ${lower(o.status)=="processing"?"selected":""}>Processing</option>
          <option ${lower(o.status)=="completed"?"selected":""}>Completed</option>
        </select>
        <button onclick="editOrder('${o.id}')" class="btn btn-primary btn-sm mt-1">Edit</button>
        <button onclick="deleteOrder('${o.id}')" class="btn btn-danger btn-sm mt-1">Delete</button>
      </td>`;
    ordersTable.appendChild(tr);
    tr.querySelector(".statusSelect").onchange=e=>updateDoc(doc(db,"orders",o.id),{status:e.target.value});
  });
}

// RENDER SELLERS
function renderSellersTable(){
  const q=lower(searchSellers.value);
  const statusF=lower(filterStatus.value);
  const dateF=filterSellersDate.value;

  sellersTable.innerHTML=`<tr><th>Name</th><th>Location</th><th>Phone</th><th>6kg</th><th>13kg</th><th>Status</th><th>Date</th><th>Actions</th></tr>`;

  const filtered=sellersData.filter(s=>(lower(s.name||"").includes(q)||safe(s.phone).includes(q))&&(!statusF||lower(s.status)===statusF)&&checkDate(s.createdAt,dateF));

  if(filtered.length===0){ sellersTable.innerHTML+=`<tr><td colspan="8">No Sellers</td></tr>`; return; }

  filtered.forEach(s=>{
    const st=lower(s.status);
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${safe(s.name)}</td>
      <td>${safe(s.location)}</td>
      <td>${safe(s.phone)}</td>
      <td>${safe(s.price6)}</td>
      <td>${safe(s.price13)}</td>
      <td class="${st}">${safe(s.status)}</td>
      <td>${formatDateTime(s.createdAt)}</td>
      <td>
        ${st=="pending"?`<button onclick="approveSeller('${s.id}')" class="btn btn-success btn-sm">Approve</button>`:""}
        <button onclick="rejectSeller('${s.id}')" class="btn btn-danger btn-sm">Reject</button>
        <button onclick="editSeller('${s.id}')" class="btn btn-primary btn-sm">Edit</button>
        <button onclick="deleteSeller('${s.id}')" class="btn btn-dark btn-sm">Delete</button>
      </td>`;
    sellersTable.appendChild(tr);
  });

  if(map){
    markers.forEach(m=>map.removeLayer(m));
    markers=[];
    filtered.forEach(s=>{
      if(s.lat && s.lng){
        const m=L.marker([s.lat,s.lng]).addTo(map).bindPopup(s.name||"Seller");
        markers.push(m);
      }
    });
  }
}

// ACTIONS
window.deleteOrder=id=>confirm("Delete?")&&deleteDoc(doc(db,"orders",id));
window.deleteSeller=id=>confirm("Delete?")&&deleteDoc(doc(db,"sellers",id));
window.approveSeller=id=>updateDoc(doc(db,"sellers",id),{status:"approved"});
window.rejectSeller=id=>updateDoc(doc(db,"sellers",id),{status:"rejected"});

window.editSeller=id=>{
  const s=sellersData.find(x=>x.id==id);
  const name=prompt("Name",s?.name||"");
  const phone=prompt("Phone",s?.phone||"");
  if(name&&phone) updateDoc(doc(db,"sellers",id),{name,phone});
};

window.editOrder=id=>{
  const o=ordersData.find(x=>x.id==id);
  const name=prompt("Name",o?.name||"");
  const phone=prompt("Phone",o?.phone||"");
  if(name&&phone) updateDoc(doc(db,"orders",id),{name,phone});
};

// EXTRA
window.showTop10Cheapest=function(){
  const sorted=[...sellersData].filter(s=>s.price6).sort((a,b)=>(parseFloat(a.price6)||0)-(parseFloat(b.price6)||0)).slice(0,10);
  alert(sorted.map(s=>s.name+" - "+s.price6).join("\n")||"No data");
}

window.showNearestSeller=function(){
  if(!navigator.geolocation){ alert("Location not supported"); return; }

  navigator.geolocation.getCurrentPosition(
    pos=>{
      const {latitude,longitude}=pos.coords;
      let nearest=null,min=Infinity;
      sellersData.forEach(s=>{
        if(!s.lat||!s.lng) return;
        const d=Math.hypot(latitude-s.lat,longitude-s.lng);
        if(d<min){min=d;nearest=s;}
      });
      nearestSellerInfo.innerText=nearest?"Nearest: "+nearest.name+" ("+nearest.location+")":"No seller found";
    },
    ()=>alert("Location permission denied")
  );
}

// LIVE UI
searchOrders.oninput=renderOrdersTable;
searchSellers.oninput=renderSellersTable;
filterOrdersDate.onchange=renderOrdersTable;
filterSellersDate.onchange=renderSellersTable;
filterStatus.onchange=renderSellersTable;

</script>
</body>
</html>
