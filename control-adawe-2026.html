<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adawe Gas Control Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
    }
    header {
      background-color: #003366;
      color: #fff;
      padding: 20px;
      text-align: center;
      font-size: 1.8em;
    }
    h2 {
      text-align: center;
      margin-top: 20px;
      color: #003366;
    }
    h3 {
      margin: 20px 10px 10px;
      color: #003366;
    }
    table {
      width: 90%;
      margin: 0 auto 30px;
      border-collapse: collapse;
      background-color: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    th, td {
      padding: 12px;
      border: 1px solid #ddd;
      text-align: left;
    }
    th {
      background-color: #003366;
      color: #fff;
    }
    tr:nth-child(even) {
      background-color: #f2f2f2;
    }
    .stats {
      width: 90%;
      margin: 0 auto 30px;
      padding: 20px;
      background-color: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .stats h3 {
      margin-top: 0;
    }
  </style>
</head>
<body>

<header>
  Adawe Gas Control
</header>

<h2>Live Dashboard</h2>

<h3>Orders</h3>
<table id="orders-table">
  <tr>
    <th>Name</th>
    <th>Location</th>
    <th>Brand</th>
    <th>Quantity</th>
    <th>Status</th>
  </tr>
</table>

<h3>Partners</h3>
<table id="partners-table">
  <tr>
    <th>Name</th>
    <th>Location</th>
    <th>Phone</th>
    <th>Business Type</th>
  </tr>
</table>

<h3>System Statistics</h3>
<div class="stats" id="system-stats">
  <p>Total Orders Today: 0</p>
  <p>Active Partners: 0</p>
  <p>Pending Orders: 0</p>
</div>

<script>
  // Sample dynamic data (later can fetch from server)
  let orders = [
    { name: "Ali Mohamed", location: "Nairobi", brand: "Gas Brand A", quantity: 5, status: "Pending" },
    { name: "Fatuma Hassan", location: "Mombasa", brand: "Gas Brand B", quantity: 3, status: "Delivered" },
    { name: "John Otieno", location: "Kisumu", brand: "Gas Brand C", quantity: 10, status: "Pending" }
  ];

  let partners = [
    { name: "Kenya Gas Ltd", location: "Nairobi", phone: "0727 111 222", businessType: "Retail" },
    { name: "Mombasa Gas Co", location: "Mombasa", phone: "0733 333 444", businessType: "Wholesale" },
    { name: "Kisumu Gas Supplies", location: "Kisumu", phone: "0712 555 666", businessType: "Retail" }
  ];

  function populateTable(tableId, data) {
    const table = document.getElementById(tableId);
    // Remove old rows except header
    table.querySelectorAll("tr:not(:first-child)").forEach(row => row.remove());
    // Add new rows
    data.forEach(item => {
      const row = document.createElement("tr");
      Object.values(item).forEach(val => {
        const cell = document.createElement("td");
        cell.textContent = val;
        row.appendChild(cell);
      });
      table.appendChild(row);
    });
  }

  function updateStats() {
    const totalOrders = orders.length;
    const pendingOrders = orders.filter(o => o.status.toLowerCase() === "pending").length;
    const activePartners = partners.length;

    const statsDiv = document.getElementById("system-stats");
    statsDiv.innerHTML = `
      <p>Total Orders Today: ${totalOrders}</p>
      <p>Active Partners: ${activePartners}</p>
      <p>Pending Orders: ${pendingOrders}</p>
    `;
  }

  function autoRefreshDashboard() {
    // Example: simulate adding a new order each interval
    const randomNames = ["Amina Ali", "Peter Mwangi", "Grace Njeri"];
    const randomLocations = ["Nairobi", "Mombasa", "Kisumu"];
    const randomBrands = ["Gas Brand A", "Gas Brand B", "Gas Brand C"];
    const newOrder = {
      name: randomNames[Math.floor(Math.random() * randomNames.length)],
      location: randomLocations[Math.floor(Math.random() * randomLocations.length)],
      brand: randomBrands[Math.floor(Math.random() * randomBrands.length)],
      quantity: Math.floor(Math.random() * 10) + 1,
      status: Math.random() > 0.5 ? "Pending" : "Delivered"
    };
    orders.push(newOrder);

    populateTable("orders-table", orders);
    populateTable("partners-table", partners); // partners unchanged
    updateStats();
  }

  // Initial populate
  populateTable("orders-table", orders);
  populateTable("partners-table", partners);
  updateStats();

  // Auto refresh every 5 seconds (5000ms)
  setInterval(autoRefreshDashboard, 5000);
</script>

</body>
</html>
