<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adawe Gas Admin Dashboard PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;background:#f7f9fb;font-family:Arial}
.navbar{background:#0b7a3c}
.navbar-brand{color:white!important}
.table-striped th { background:#198754; color:white; }
.pending{background:#fff3cd}
.processing{background:#cfe2ff}
.completed{background:#d1e7dd}
.approved{background:#d4edda}
.rejected{background:#f8d7da}
.stat-box{background:white;padding:15px;border-radius:8px;text-align:center;margin-bottom:10px}
</style>
</head>

<body>

<nav class="navbar">
<div class="container">
<a class="navbar-brand">Adawe Gas Admin</a>
</div>
</nav>

<div id="loginPage" class="container mt-5" style="max-width:400px;">
<h3>Admin Login</h3>
<input id="email" class="form-control mb-2" placeholder="Email">
<input id="password" type="password" class="form-control mb-2" placeholder="Password">
<button onclick="login()" class="btn btn-success w-100">Login</button>
<p id="loginError" style="color:red;"></p>
</div>

<div id="dashboard" style="display:none;" class="container mt-4">

<div class="row text-center">
<div class="col-md-3"><div class="stat-box"><h4 id="totalOrders">0</h4><p>Total Orders</p></div></div>
<div class="col-md-3"><div class="stat-box"><h4 id="pendingOrders">0</h4><p>Pending Orders</p></div></div>
<div class="col-md-3"><div class="stat-box"><h4 id="todayOrders">0</h4><p>Today's Orders</p></div></div>
<div class="col-md-3"><div class="stat-box"><h4 id="totalRevenue">0</h4><p>Total Revenue (KES)</p></div></div>
</div>

<div class="card p-3 mb-4">
<h5>Sales Overview</h5>
<canvas id="salesChart"></canvas>
</div>

<h3>Orders</h3>
<input id="searchOrders" class="form-control mb-2" placeholder="Search Orders...">
<select id="statusFilter" class="form-select mb-2">
<option value="">All Status</option>
<option value="Pending">Pending</option>
<option value="Processing">Processing</option>
<option value="Completed">Completed</option>
</select>
<table id="ordersTable" class="table table-striped"></table>

<h3 class="mt-4">Sellers</h3>
<table id="sellersTable" class="table table-striped"></table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVhASqIXG5OaVk1nr8c3hZ-_liTg1UIsw",
  authDomain: "adawe-gas-system-82187.firebaseapp.com",
  projectId: "adawe-gas-system-82187",
  storageBucket: "adawe-gas-system-82187.firebasestorage.app",
  messagingSenderId: "644303663526",
  appId: "1:644303663526:web:bacf9e5db0d7787f705f67"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let ordersData=[], sellersData=[];
let chart;

function formatDate(ts){
 if(!ts) return "";
 const d = ts.toDate ? ts.toDate() : new Date(ts);
 return d.toLocaleString();
}

window.login = async function(){
 try{
  const userCredential = await signInWithEmailAndPassword(auth,email.value,password.value);
  const uid = userCredential.user.uid;
  const adminDoc = await getDoc(doc(db,"admins",uid));

  if(!adminDoc.exists()){
    loginError.innerText="Not admin";
    return;
  }

  loginPage.style.display="none";
  dashboard.style.display="block";
  startRealtime();

 }catch(err){
  loginError.innerText=err.message;
 }
};

function startRealtime(){

 onSnapshot(collection(db,"orders"), snap=>{
  ordersData=[];
  snap.forEach(d=>{
    const order = {id:d.id,...d.data()};
    ordersData.push(order);

    // 🔥 AUTO ASSIGN
    if(!order.sellerName){
      autoAssignSeller(order);
    }
  });
  renderOrders();
  updateStatsAndChart();
 });

 onSnapshot(collection(db,"sellers"), snap=>{
  sellersData=[];
  snap.forEach(d=>sellersData.push({id:d.id,...d.data()}));
  renderSellers();
 });
}

// 🔥 AUTO ASSIGN FUNCTION
async function autoAssignSeller(order){
  if(!order.quantity) return;

  let bestSeller=null;
  let bestPrice=Infinity;

  sellersData.forEach(s=>{
    if((s.status||"").toLowerCase()!=="approved") return;

    if(s.prices && s.prices[order.quantity]){
      const p=s.prices[order.quantity];
      if(p>0 && p<bestPrice){ bestPrice=p; bestSeller=s; }
    }

    if(order.quantity==="6kg" && s.price6 && s.price6<bestPrice){
      bestPrice=s.price6; bestSeller=s;
    }

    if(order.quantity==="13kg" && s.price13 && s.price13<bestPrice){
      bestPrice=s.price13; bestSeller=s;
    }
  });

  if(bestSeller){
    await updateDoc(doc(db,"orders",order.id),{
      sellerName:bestSeller.name,
      sellerPhone:bestSeller.phone,
      price:bestPrice,
      status:"Processing"
    });
  }
}

function updateStatsAndChart(){
 let total=0,pending=0,today=0,revenue=0;
 const todayDate=new Date().toDateString();
 let dailyMap={};

 ordersData.forEach(o=>{
  total++;
  if((o.status||"Pending")==="Pending") pending++;
  if(o.price) revenue+=o.price;

  if(o.createdAt){
    const d=o.createdAt.toDate();
    if(d.toDateString()===todayDate) today++;
    const day=d.toLocaleDateString();
    dailyMap[day]=(dailyMap[day]||0)+1;
  }
 });

 totalOrders.innerText=total;
 pendingOrders.innerText=pending;
 todayOrders.innerText=today;
 totalRevenue.innerText=revenue;

 if(chart) chart.destroy();

 chart=new Chart(document.getElementById("salesChart"),{
  type:"line",
  data:{labels:Object.keys(dailyMap),datasets:[{label:"Orders per Day",data:Object.values(dailyMap)}]}
 });
}

function renderOrders(){
 ordersTable.innerHTML=`<tr>
 <th>Name</th><th>Phone</th><th>Qty</th><th>Brand</th><th>Status</th><th>Date</th><th>Actions</th></tr>`;

 ordersData.forEach(o=>{
  ordersTable.innerHTML+=`
  <tr>
  <td>${o.name||""}</td>
  <td>${o.phone||""}</td>
  <td>${o.quantity||""}</td>
  <td>${o.brand||""}</td>
  <td>${o.status||"pending"}</td>
  <td>${formatDate(o.createdAt)}</td>
  <td>
  <button onclick="editOrder('${o.id}')" class="btn btn-primary btn-sm">Edit</button>
  <button onclick="deleteOrder('${o.id}')" class="btn btn-danger btn-sm">Delete</button>
  </td>
  </tr>`;
 });
}

function renderSellers(){
 sellersTable.innerHTML=`<tr>
 <th>Name</th>
 <th>Phone</th>
 <th>Location</th>
 <th>1kg</th>
 <th>3kg</th>
 <th>6kg</th>
 <th>13kg</th>
 <th>15kg</th>
 <th>22kg</th>
 <th>25kg</th>
 <th>35kg</th>
 <th>40kg</th>
 <th>45kg</th>
 <th>50kg</th>
 <th>Status</th>
 <th>Date</th>
 <th>Actions</th>
 </tr>`;

 sellersData.forEach(s=>{
  sellersTable.innerHTML+=`
  <tr>
  <td>${s.name||""}</td>
  <td>${s.phone||""}</td>
  <td>${s.location||""}</td>

  <td>${s.prices?.["1kg"]||""}</td>
  <td>${s.prices?.["3kg"]||""}</td>
  <td>${s.prices?.["6kg"]||s.price6||""}</td>
  <td>${s.prices?.["13kg"]||s.price13||""}</td>
  <td>${s.prices?.["15kg"]||""}</td>
  <td>${s.prices?.["22kg"]||""}</td>
  <td>${s.prices?.["25kg"]||""}</td>
  <td>${s.prices?.["35kg"]||""}</td>
  <td>${s.prices?.["40kg"]||""}</td>
  <td>${s.prices?.["45kg"]||""}</td>
  <td>${s.prices?.["50kg"]||""}</td>

  <td class="${(s.status||"pending").toLowerCase()}">${s.status||"pending"}</td>
  <td>${formatDate(s.createdAt)}</td>

  <td>
  ${(s.status||"").toLowerCase()==="pending" ? `<button onclick="approveSeller('${s.id}')" class="btn btn-success btn-sm">Approve</button>`:""}
  <button onclick="editSeller('${s.id}')" class="btn btn-primary btn-sm mt-1">Edit</button>
  <button onclick="deleteSeller('${s.id}')" class="btn btn-danger btn-sm mt-1">Delete</button>
  </td>

  </tr>`;
 });
}

// 🔥 EDIT SELLER ALL PRICES
window.editSeller=async id=>{
 const s=sellersData.find(x=>x.id==id);

 const prices={
  "1kg":parseInt(prompt("1kg",s.prices?.["1kg"]||0))||0,
  "3kg":parseInt(prompt("3kg",s.prices?.["3kg"]||0))||0,
  "6kg":parseInt(prompt("6kg",s.prices?.["6kg"]||s.price6||0))||0,
  "13kg":parseInt(prompt("13kg",s.prices?.["13kg"]||s.price13||0))||0,
  "15kg":parseInt(prompt("15kg",s.prices?.["15kg"]||0))||0,
  "22kg":parseInt(prompt("22kg",s.prices?.["22kg"]||0))||0,
  "25kg":parseInt(prompt("25kg",s.prices?.["25kg"]||0))||0,
  "35kg":parseInt(prompt("35kg",s.prices?.["35kg"]||0))||0,
  "40kg":parseInt(prompt("40kg",s.prices?.["40kg"]||0))||0,
  "45kg":parseInt(prompt("45kg",s.prices?.["45kg"]||0))||0,
  "50kg":parseInt(prompt("50kg",s.prices?.["50kg"]||0))||0
 };

 await updateDoc(doc(db,"sellers",id),{
  name:s.name,
  phone:s.phone,
  location:s.location,
  prices,
  price6:prices["6kg"],
  price13:prices["13kg"]
 });
};

window.deleteOrder=id=>deleteDoc(doc(db,"orders",id));
window.deleteSeller=id=>deleteDoc(doc(db,"sellers",id));

window.editOrder=async id=>{
 const o=ordersData.find(x=>x.id==id);
 const name=prompt("Name",o.name);
 await updateDoc(doc(db,"orders",id),{name});
};

</script>

</body>
</html>
