<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adawe Gas Admin Dashboard</title>

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
*{font-family:'Poppins',sans-serif}
body{margin:0;background:#f7f9fb}

/* NAVBAR */
.navbar{background:#0b7a3c}
.navbar-brand,.nav-link{color:white!important}

/* DASHBOARD */
header { background:#0f7b3f; color:white; text-align:center; padding:20px; font-size:1.8em; font-weight:bold; }
.stats { display:flex; gap:20px; margin-top:20px; }
.stat-box { background:white; padding:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); flex:1; text-align:center; }
.table-striped th { background:#198754; color:white; }
.search-input { margin-bottom:10px; width:100%; padding:6px 8px; }

/* MAP */
#map{height:400px;border-radius:20px;}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand">Adawe Gas Admin</a>
</div>
</nav>

<!-- ADMIN LOGIN -->
<div id="loginPage" class="container mt-5" style="max-width:400px;">
  <h3 class="text-center mb-3">Admin Login</h3>
  <input id="email" type="email" class="form-control mb-2" placeholder="Email">
  <input id="password" type="password" class="form-control mb-2" placeholder="Password">
  <button onclick="login()" class="btn btn-success w-100">Login</button>
  <p id="loginError" style="color:red;"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">
<header>
  Adawe Gas Control
  <span id="pendingCount" style="background:#dc3545;color:white;padding:3px 8px;border-radius:50%;margin-left:10px;">0</span>
</header>

<div class="container section">
<div class="stats">
  <div class="stat-box"><h4 id="totalOrders">0</h4><p>Total Orders</p></div>
  <div class="stat-box"><h4 id="pendingOrders">0</h4><p>Pending Orders</p></div>
</div>

<h3 class="mt-4">Orders</h3>
<input type="text" id="searchOrders" class="search-input" placeholder="Search Orders...">
<table id="ordersTable" class="table table-striped"></table>

<h3 class="mt-4">Sellers</h3>
<input type="text" id="searchSellers" class="search-input" placeholder="Search Sellers...">
<select id="filterStatus" class="form-select mb-3">
  <option value="">All Status</option>
  <option value="pending">Pending</option>
  <option value="approved">Approved</option>
  <option value="rejected">Rejected</option>
</select>
<table id="sellersTable" class="table table-striped"></table>

<h3 class="mt-4">📍 Sellers Map</h3>
<div id="map"></div>
</div>
</div>

<!-- LEAFLET + FIREBASE -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBVhASqIXG5OaVk1nr8c3hZ-_liTg1UIsw",
  authDomain: "adawe-gas-system-82187.firebaseapp.com",
  projectId: "adawe-gas-system-82187",
  storageBucket: "adawe-gas-system-82187.appspot.com",
  messagingSenderId: "644303663526",
  appId: "1:644303663526:web:bacf9e5db0d7787f705f67"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let ordersData=[], sellersData=[], map, markers=[];

// Initialize map
function initMap(){
  map = L.map('map').setView([-1.28,36.81],10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap'}).addTo(map);
}

// Admin login
window.login = function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  signInWithEmailAndPassword(auth,email,password).then(()=>{
    document.getElementById("loginPage").style.display="none";
    document.getElementById("dashboard").style.display="block";
    initMap();
    startRealtime();
  }).catch(()=>{ document.getElementById("loginError").innerText="Login failed"; });
}

// Start real-time updates
function startRealtime(){
  onSnapshot(collection(db,"orders"), snapshot=>{
    ordersData=[];
    snapshot.forEach(docSnap=> ordersData.push({id:docSnap.id,...docSnap.data()}));
    renderOrdersTable();
    document.getElementById("totalOrders").innerText = ordersData.length;
    document.getElementById("pendingOrders").innerText = ordersData.filter(o=>o.status==="Pending").length;
  });

  onSnapshot(collection(db,"sellers"), snapshot=>{
    sellersData=[];
    let pendingCount = 0;
    snapshot.forEach(docSnap=>{
      const s = {id:docSnap.id, ...docSnap.data()};
      sellersData.push(s);
      if(s.status==="pending") pendingCount++;
    });
    document.getElementById("pendingCount").innerText = pendingCount;
    renderSellersTable();
  });
}

// Render Orders Table
function renderOrdersTable(){
  const table = document.getElementById("ordersTable");
  const query = document.getElementById("searchOrders").value.toLowerCase();
  table.innerHTML=`<tr><th>Name</th><th>Phone</th><th>Location</th><th>Brand</th><th>Qty</th><th>Status</th><th>Actions</th></tr>`;
  ordersData.filter(o => o.name.toLowerCase().includes(query) || o.phone.includes(query)).forEach(o=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${o.name}</td>
      <td>${o.phone}</td>
      <td>${o.location}</td>
      <td>${o.brand}</td>
      <td>${o.quantity}</td>
      <td>${o.status}</td>
      <td>
        <select class="form-select form-select-sm statusSelect">
          <option ${o.status==="Pending"?"selected":""}>Pending</option>
          <option ${o.status==="Processing"?"selected":""}>Processing</option>
          <option ${o.status==="Completed"?"selected":""}>Completed</option>
        </select>
      </td>`;
    table.appendChild(tr);
    const select = tr.querySelector(".statusSelect");
    select.addEventListener("change", async ()=>{ await updateDoc(doc(db,"orders",o.id),{status:select.value}); });
  });
}

// Render Sellers Table
function renderSellersTable(){
  const table = document.getElementById("sellersTable");
  const searchText = document.getElementById("searchSellers").value.toLowerCase();
  const filterStatus = document.getElementById("filterStatus").value;

  table.innerHTML=`<tr><th>Name</th><th>Location</th><th>Phone</th><th>6kg</th><th>13kg</th><th>Status</th><th>Actions</th></tr>`;
  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  sellersData
    .filter(s=>(!filterStatus || s.status===filterStatus))
    .filter(s=>s.name.toLowerCase().includes(searchText))
    .forEach(s=>{
      const tr=document.createElement("tr");
      tr.innerHTML=`
        <td>${s.name||'-'}</td>
        <td>${s.location||'-'}</td>
        <td>${s.phone||'-'}</td>
        <td>${s.price6||'-'}</td>
        <td>${s.price13||'-'}</td>
        <td>${s.status||'pending'}</td>
        <td>
          ${s.status==='pending'?`<button class="btn btn-success btn-sm" onclick="approveSeller('${s.id}')">Approve</button>`:"-"}
          ${s.status!=='rejected'?`<button class="btn btn-danger btn-sm" onclick="rejectSeller('${s.id}')">Reject</button>`:"-"}
          <button class="btn btn-primary btn-sm" onclick="editSeller('${s.id}')">Edit</button>
        </td>`;
      table.appendChild(tr);
      if(s.lat && s.lng && s.status==="approved"){
        const marker = L.marker([s.lat,s.lng]).addTo(map);
        marker.bindPopup(`<b>${s.name}</b><br>📍 ${s.location}<br>📞 ${s.phone}`);
        markers.push(marker);
      }
    });
}

// Approve / Reject / Edit
async function approveSeller(id){ await updateDoc(doc(db,"sellers",id),{status:"approved"}); }
async function rejectSeller(id){ await updateDoc(doc(db,"sellers",id),{status:"rejected"}); }
async function editSeller(id){
  const s = sellersData.find(x=>x.id===id);
  if(!s) return;
  const newName = prompt("Company Name", s.name);
  const newPhone = prompt("Phone", s.phone);
  const newPrice6 = prompt("6kg Price", s.price6||"");
  const newPrice13 = prompt("13kg Price", s.price13||"");
  if(newName && newPhone) await updateDoc(doc(db,"sellers",id),{name:newName, phone:newPhone, price6:newPrice6?parseInt(newPrice6):null, price13:newPrice13?parseInt(newPrice13):null});
}

// Search & Filter listeners
document.getElementById("searchOrders").addEventListener("input", renderOrdersTable);
document.getElementById("searchSellers").addEventListener("input", renderSellersTable);
document.getElementById("filterStatus").addEventListener("change", renderSellersTable);

</script>
</body>
</html>
