<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adawe Gas Control Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { font-family: Arial; background:#f5f5f5; }
header { background:#0f7b3f; color:white; text-align:center; padding:20px; font-size:1.8em; font-weight:bold; }
.section { padding:40px 20px; }
h3 { margin-top:30px; }
table { width:100%; border-collapse: collapse; margin-top:15px; }
th, td { border:1px solid #ccc; padding:8px; text-align:left; }
th { background:#198754; color:white; }
.stats { display:flex; gap:20px; margin-top:20px; }
.stat-box { background:white; padding:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); flex:1; text-align:center; }
.btn-sm { font-size:.75rem; padding:.25rem .5rem; }
.status-pending { background:#fff3cd; }   /* yellow */
.status-delivered { background:#d4edda; } /* green */
.btn-pending { background:#ffc107; color:black; pointer-events:none; }  /* Disabled Pending button */
.btn-delivered { background:#28a745; color:white; }
.btn-danger { background:#dc3545; color:white; }
.btn-download { margin-bottom:15px; }
</style>
</head>

<body>

<header>Adawe Gas Control</header>

<section class="section">
<h2>Live Dashboard</h2>

<div class="stats">
<div class="stat-box">
<h4>Total Orders</h4>
<p id="totalOrders">0</p>
</div>
<div class="stat-box">
<h4>Pending Orders</h4>
<p id="pendingOrders">0</p>
</div>
<div class="stat-box">
<h4>Active Partners</h4>
<p id="activePartners">0</p>
</div>
</div>

<!-- Download Buttons -->
<div class="mb-3">
  <button id="downloadOrders" class="btn btn-primary btn-download">Download Orders CSV</button>
  <button id="downloadPartners" class="btn btn-secondary btn-download">Download Partners CSV</button>
</div>

<h3>Orders</h3>
<table id="ordersTable">
<tr>
<th>Name</th>
<th>Location</th>
<th>Brand</th>
<th>Quantity</th>
<th>Unit</th>
<th>Status</th>
<th>Actions</th>
</tr>
</table>

<h3>Partners</h3>
<table id="partnersTable">
<tr>
<th>Name</th>
<th>Location</th>
<th>Phone</th>
<th>Business Type</th>
<th>Actions</th>
</tr>
</table>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBVhASqIXG5OaVk1nr8c3hZ-_liTg1UIsw",
  authDomain: "adawe-gas-system-82187.firebaseapp.com",
  projectId: "adawe-gas-system-82187",
  storageBucket: "adawe-gas-system-82187.appspot.com",
  messagingSenderId: "644303663526",
  appId: "1:644303663526:web:bacf9e5db0d7787f705f67"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function fetchDashboard() {
  // ===== Orders =====
  const ordersSnap = await getDocs(query(collection(db, "orders"), orderBy("createdAt", "desc")));
  const ordersTable = document.getElementById("ordersTable");
  ordersTable.innerHTML = `<tr>
<th>Name</th><th>Location</th><th>Brand</th><th>Quantity</th><th>Unit</th><th>Status</th><th>Actions</th>
</tr>`;

  let totalOrders = 0, pendingOrders = 0;

  ordersSnap.forEach(docSnap => {
    const o = docSnap.data();
    const tr = document.createElement("tr");

    const status = o.status || "Pending";
    const statusClass = status === "Pending" ? "status-pending" : "status-delivered";
    tr.className = statusClass;

    // Color-coded Delivered/Pending button
    const actionBtn = status==="Pending" 
      ? `<button class="btn btn-sm btn-delivered mark-delivered">Delivered</button>` 
      : `<span class="btn btn-sm btn-pending">Delivered</span>`;

    tr.innerHTML = `<td>${o.name}</td>
                    <td>${o.location}</td>
                    <td>${o.brand}</td>
                    <td>${o.quantity}</td>
                    <td>${o.unit || ""}</td>
                    <td>${status}</td>
                    <td>${actionBtn} <button class="btn btn-sm btn-danger delete-order">Delete</button></td>`;
    ordersTable.appendChild(tr);

    // Mark as Delivered
    if(status==="Pending") {
      tr.querySelector(".mark-delivered").addEventListener("click", async () => {
        await updateDoc(doc(db, "orders", docSnap.id), { status: "Delivered" });
        fetchDashboard();
      });
    }

    // Delete order
    tr.querySelector(".delete-order").addEventListener("click", async () => {
      if(confirm("Are you sure you want to delete this order?")) {
        await deleteDoc(doc(db, "orders", docSnap.id));
        fetchDashboard();
      }
    });

    totalOrders++;
    if(status==="Pending") pendingOrders++;
  });

  document.getElementById("totalOrders").textContent = totalOrders;
  document.getElementById("pendingOrders").textContent = pendingOrders;

  // ===== Partners =====
  const partnersSnap = await getDocs(collection(db, "partners"));
  const partnersTable = document.getElementById("partnersTable");
  partnersTable.innerHTML = `<tr>
<th>Name</th><th>Location</th><th>Phone</th><th>Business Type</th><th>Actions</th>
</tr>`;

  partnersSnap.forEach(docSnap => {
    const p = docSnap.data();
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${p.name}</td><td>${p.location}</td><td>${p.phone}</td><td>${p.businessType}</td>
                   <td><button class="btn btn-sm btn-danger delete-partner">Delete</button></td>`;
    partnersTable.appendChild(tr);

    // Delete partner
    tr.querySelector(".delete-partner").addEventListener("click", async () => {
      if(confirm("Are you sure you want to delete this partner?")) {
        await deleteDoc(doc(db, "partners", docSnap.id));
        fetchDashboard();
      }
    });
  });

  document.getElementById("activePartners").textContent = partnersSnap.size;
}

// ===== Download Orders =====
document.getElementById("downloadOrders").addEventListener("click", async () => {
  const ordersSnap = await getDocs(collection(db, "orders"));
  let csv = "Name,Location,Brand,Quantity,Unit,Status,CreatedAt\n";
  ordersSnap.forEach(docSnap => {
    const o = docSnap.data();
    const createdAt = o.createdAt?.toDate?.() || o.createdAt || "";
    csv += `"${o.name}","${o.location}","${o.brand}","${o.quantity}","${o.unit || ""}","${o.status || "Pending"}","${createdAt}"\n`;
  });
  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "orders.csv";
  a.click();
  URL.revokeObjectURL(url);
});

// ===== Download Partners =====
document.getElementById("downloadPartners").addEventListener("click", async () => {
  const partnersSnap = await getDocs(collection(db, "partners"));
  let csv = "Name,Location,Phone,BusinessType,CreatedAt\n";
  partnersSnap.forEach(docSnap => {
    const p = docSnap.data();
    const createdAt = p.createdAt?.toDate?.() || p.createdAt || "";
    csv += `"${p.name}","${p.location}","${p.phone}","${p.businessType}","${createdAt}"\n`;
  });
  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "partners.csv";
  a.click();
  URL.revokeObjectURL(url);
});

// Initial fetch
fetchDashboard();
// Auto-refresh every 10s
setInterval(fetchDashboard, 10000);

</script>

</body>
</html>
