<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adawe Gas Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
*{font-family:'Poppins',sans-serif}
body{margin:0;background:#f7f9fb}
.navbar{background:#0b7a3c}
.navbar-brand,.nav-link{color:white!important}
header { background:#0f7b3f; color:white; text-align:center; padding:20px; font-size:1.8em; font-weight:bold; }
.stats { display:flex; gap:20px; margin-top:20px; }
.stat-box { background:white; padding:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); flex:1; text-align:center; }
.table-striped th { background:#198754; color:white; }
.search-input { margin-bottom:10px; width:100%; padding:6px 8px; }
#map{height:400px;border-radius:20px;}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand">Adawe Gas Admin</a>
</div>
</nav>

<!-- LOGIN -->
<div id="loginPage" class="container mt-5" style="max-width:400px;">
  <h3 class="text-center mb-3">Admin Login</h3>
  <input id="email" type="email" class="form-control mb-2" placeholder="Email">
  <input id="password" type="password" class="form-control mb-2" placeholder="Password">
  <button onclick="login()" class="btn btn-success w-100">Login</button>
  <p id="loginError" style="color:red;"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">
<header>
  Adawe Gas Control
  <span id="pendingCount" style="background:#dc3545;color:white;padding:3px 8px;border-radius:50%;margin-left:10px;">0</span>
</header>

<div class="container section">

<div class="stats">
  <div class="stat-box"><h4 id="totalOrders">0</h4><p>Total Orders</p></div>
  <div class="stat-box"><h4 id="pendingOrders">0</h4><p>Pending Orders</p></div>
</div>

<h3 class="mt-4">Orders</h3>
<input type="text" id="searchOrders" class="search-input" placeholder="Search Orders...">
<table id="ordersTable" class="table table-striped"></table>

<h3 class="mt-4">Sellers</h3>
<input type="text" id="searchSellers" class="search-input" placeholder="Search Sellers...">
<select id="filterStatus" class="form-select mb-3">
  <option value="">All Status</option>
  <option value="pending">Pending</option>
  <option value="approved">Approved</option>
  <option value="rejected">Rejected</option>
</select>
<table id="sellersTable" class="table table-striped"></table>

<div class="mt-3 text-center">
  <button class="btn btn-warning" onclick="showNearestSeller()">Show Nearest Seller</button>
  <p id="nearestSellerInfo" class="mt-2 fw-bold"></p>
</div>

<h3 class="mt-4">📍 Sellers Map</h3>
<div id="map"></div>

</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVhASqIXG5OaVk1nr8c3hZ-_liTg1UIsw",
  authDomain: "adawe-gas-system-82187.firebaseapp.com",
  projectId: "adawe-gas-system-82187",
  storageBucket: "adawe-gas-system-82187.appspot.com",
  messagingSenderId: "644303663526",
  appId: "1:644303663526:web:bacf9e5db0d7787f705f67"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let ordersData=[], sellersData=[], map, markers=[];

// MAP
function initMap(){
  map = L.map('map').setView([-1.28,36.81],10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

// LOGIN
window.login = function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth,email,password).then(res=>{
    if(res.user.email !== email){
      alert("Not admin");
      return;
    }
    document.getElementById("loginPage").style.display="none";
    document.getElementById("dashboard").style.display="block";
    initMap();
    startRealtime();
  }).catch(()=>{ document.getElementById("loginError").innerText="Login failed"; });
}

// REALTIME
function startRealtime(){
  onSnapshot(collection(db,"orders"), snapshot=>{
    ordersData=[];
    snapshot.forEach(docSnap=> ordersData.push({id:docSnap.id,...docSnap.data()}));
    renderOrdersTable();
    document.getElementById("totalOrders").innerText = ordersData.length;
    document.getElementById("pendingOrders").innerText = ordersData.filter(o=>o.status==="Pending").length;
  });

  onSnapshot(collection(db,"sellers"), snapshot=>{
    sellersData=[];
    let pendingCount = 0;
    snapshot.forEach(docSnap=>{
      const s = {id:docSnap.id,...docSnap.data()};
      sellersData.push(s);
      if(s.status==="pending") pendingCount++;
    });
    document.getElementById("pendingCount").innerText = pendingCount;
    renderSellersTable();
  });
}

// ORDERS
function renderOrdersTable(){
  const table = document.getElementById("ordersTable");
  const query = document.getElementById("searchOrders").value.toLowerCase();

  table.innerHTML=`<tr><th>Name</th><th>Phone</th><th>Location</th><th>Brand</th><th>Qty</th><th>Status</th><th>Actions</th></tr>`;

  ordersData
  .filter(o => (o.name||"").toLowerCase().includes(query) || (o.phone||"").includes(query))
  .forEach(o=>{
    const tr=document.createElement("tr");

    tr.innerHTML=`
    <td>${o.name||"-"}</td>
    <td>${o.phone||"-"}</td>
    <td>${o.location||"-"}</td>
    <td>${o.brand||"-"}</td>
    <td>${o.quantity||"-"}</td>
    <td>${o.status||"-"}</td>
    <td>
      <select class="form-select form-select-sm statusSelect">
        <option ${o.status==="Pending"?"selected":""}>Pending</option>
        <option ${o.status==="Processing"?"selected":""}>Processing</option>
        <option ${o.status==="Completed"?"selected":""}>Completed</option>
      </select>
      <button class="btn btn-danger btn-sm mt-1" onclick="deleteOrder('${o.id}')">Delete</button>
    </td>`;

    table.appendChild(tr);

    tr.querySelector(".statusSelect").addEventListener("change", async (e)=>{
      await updateDoc(doc(db,"orders",o.id),{status:e.target.value});
    });
  });
}

// SELLERS
function renderSellersTable(){
  const table = document.getElementById("sellersTable");
  const searchText = document.getElementById("searchSellers").value.toLowerCase();
  const filterStatus = document.getElementById("filterStatus").value;

  table.innerHTML=`<tr><th>Name</th><th>Location</th><th>Phone</th><th>6kg</th><th>13kg</th><th>Status</th><th>Actions</th></tr>`;

  if(map){ markers.forEach(m=>map.removeLayer(m)); }
  markers=[];

  sellersData
  .filter(s=>(!filterStatus || s.status===filterStatus))
  .filter(s=>(s.name||"").toLowerCase().includes(searchText))
  .forEach(s=>{
    const tr=document.createElement("tr");

    tr.innerHTML=`
    <td>${s.name||"-"}</td>
    <td>${s.location||"-"}</td>
    <td>${s.phone||"-"}</td>
    <td>${s.price6||"-"}</td>
    <td>${s.price13||"-"}</td>
    <td>${s.status||"pending"}</td>
    <td>
      ${s.status==='pending'?`<button class="btn btn-success btn-sm" onclick="approveSeller('${s.id}')">Approve</button>`:""}
      <button class="btn btn-danger btn-sm" onclick="rejectSeller('${s.id}')">Reject</button>
      <button class="btn btn-primary btn-sm" onclick="editSeller('${s.id}')">Edit</button>
      <button class="btn btn-dark btn-sm" onclick="deleteSeller('${s.id}')">Delete</button>
    </td>`;

    table.appendChild(tr);

    const lat=parseFloat(s.lat);
    const lng=parseFloat(s.lng);

    if(!isNaN(lat) && !isNaN(lng) && s.status==="approved"){
      const marker=L.marker([lat,lng]).addTo(map);
      marker.bindPopup(`<b>${s.name}</b>`);
      markers.push(marker);
    }
  });
}

// ACTIONS
window.deleteOrder = async id=>{
  if(confirm("Delete order?")) await deleteDoc(doc(db,"orders",id));
}

window.deleteSeller = async id=>{
  if(confirm("Delete seller?")) await deleteDoc(doc(db,"sellers",id));
}

window.approveSeller = async id=>{
  await updateDoc(doc(db,"sellers",id),{status:"approved"});
}

window.rejectSeller = async id=>{
  await updateDoc(doc(db,"sellers",id),{status:"rejected"});
}

window.editSeller = async id=>{
  const s=sellersData.find(x=>x.id===id);
  if(!s) return;
  const name=prompt("Name",s.name);
  const phone=prompt("Phone",s.phone);
  if(name && phone){
    await updateDoc(doc(db,"sellers",id),{name,phone});
  }
}

// NEAREST
function distance(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

window.showNearestSeller=function(){
  const center=map.getCenter();
  let nearest=null,min=Infinity;

  sellersData.forEach(s=>{
    const lat=parseFloat(s.lat), lng=parseFloat(s.lng);
    if(s.status!=="approved"||isNaN(lat)||isNaN(lng)) return;
    const d=distance(center.lat,center.lng,lat,lng);
    if(d<min){min=d;nearest=s;}
  });

  document.getElementById("nearestSellerInfo").innerText=
    nearest?`Nearest: ${nearest.name} (${min.toFixed(2)} km)`:"No seller";
}

// LISTENERS
document.getElementById("searchOrders").addEventListener("input",renderOrdersTable);
document.getElementById("searchSellers").addEventListener("input",renderSellersTable);
document.getElementById("filterStatus").addEventListener("change",renderSellersTable);

</script>
</body>
</html>
