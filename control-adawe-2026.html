<!DOCTYPE html>
<html>
<head>

<title>Adawe Gas Control</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#0a7f2e;
color:white;
padding:15px;
font-size:22px;
}

nav{
background:#111;
padding:10px;
}

nav a{
color:white;
margin-right:15px;
text-decoration:none;
}

section{
padding:20px;
}

input,select{
padding:8px;
margin:5px 0;
width:100%;
}

button{
background:#0a7f2e;
color:white;
border:none;
padding:10px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:10px;
}

table th,table td{
border:1px solid #ddd;
padding:8px;
}

table th{
background:#0a7f2e;
color:white;
}

</style>
</head>

<body>

<header>
Adawe Gas Control
</header>

<nav>
<a href="#">Home</a>
<a href="#">Order</a>
<a href="#">Partner</a>
<a href="#">Dashboard</a>
<a href="#">Contact</a>
</nav>

<section>

<h2>Place Order</h2>

<input id="name" placeholder="Name">
<input id="location" placeholder="Location">
<input id="quantity" placeholder="Quantity">

<select id="unit">
<option value="">Select Unit</option>
<option value="Cylinder(s)">Cylinder(s)</option>
<option value="Kgs">Kgs</option>
</select>

<select id="brand">
<option value="">Select Gas Brand</option>
<option>Rubis Gas</option>
<option>TotalEnergies</option>
<option>Shell</option>
<option>Oryx</option>
</select>

<button onclick="placeOrder()">Submit Order</button>

</section>

<section>

<h2>Register as Partner</h2>

<input id="pname" placeholder="Company Name">
<input id="plocation" placeholder="Location">
<input id="phone" placeholder="Phone">

<select id="type">
<option value="">Select Business Type</option>
<option value="Retail">Retail</option>
<option value="Wholesale">Wholesale</option>
</select>

<button onclick="addPartner()">Register</button>

</section>

<section>

<h2>Live Dashboard</h2>

<h3>Orders</h3>

<table id="ordersTable">

<tr>
<th>Name</th>
<th>Location</th>
<th>Brand</th>
<th>Quantity</th>
<th>Status</th>
</tr>

</table>

<h3>Partners</h3>

<table id="partnersTable">

<tr>
<th>Name</th>
<th>Location</th>
<th>Phone</th>
<th>Business Type</th>
</tr>

</table>

</section>

<section>

<h3>Contact</h3>

<p>📞 0727 015 434</p>
<p>📍 Nairobi, Kenya</p>
<p>© 2026 Adawe Gas</p>

</section>

<script>

function placeOrder(){

let name=document.getElementById("name").value
let location=document.getElementById("location").value
let quantity=document.getElementById("quantity").value
let unit=document.getElementById("unit").value
let brand=document.getElementById("brand").value

let table=document.getElementById("ordersTable")

let row=table.insertRow()

row.insertCell(0).innerHTML=name
row.insertCell(1).innerHTML=location
row.insertCell(2).innerHTML=brand
row.insertCell(3).innerHTML=quantity+" "+unit
row.insertCell(4).innerHTML="Pending"

}

function addPartner(){

let name=document.getElementById("pname").value
let location=document.getElementById("plocation").value
let phone=document.getElementById("phone").value
let type=document.getElementById("type").value || "N/A"

let table=document.getElementById("partnersTable")

let row=table.insertRow()

row.insertCell(0).innerHTML=name
row.insertCell(1).innerHTML=location
row.insertCell(2).innerHTML=phone
row.insertCell(3).innerHTML=type

}

</script>

</body>
</html>
