<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adawe Gas Control Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { font-family: Arial; background:#f5f5f5; }
header { background:#0f7b3f; color:white; text-align:center; padding:20px; font-size:1.8em; font-weight:bold; }
.section { padding:40px 20px; }
h3 { margin-top:30px; }
table { width:100%; border-collapse: collapse; margin-top:15px; }
th, td { border:1px solid #ccc; padding:8px; text-align:left; }
th { background:#198754; color:white; }
.stats { display:flex; gap:20px; margin-top:20px; }
.stat-box { background:white; padding:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); flex:1; text-align:center; }
.btn-sm { font-size:.75rem; padding:.25rem .5rem; }
.status-pending { background:#fff3cd; }
.status-delivered { background:#d4edda; }
.btn-pending { background:#ffc107; color:black; pointer-events:none; }
.btn-delivered { background:#28a745; color:white; }
.btn-danger { background:#dc3545; color:white; }
.btn-download { margin-bottom:15px; }
.search-input { margin-bottom:10px; }
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="container mt-5" style="max-width:400px;">
<h3 class="text-center mb-3">Admin Login</h3>

<input type="email" id="email" class="form-control mb-2" placeholder="Email">
<input type="password" id="password" class="form-control mb-3" placeholder="Password">

<button onclick="login()" class="btn btn-success w-100">Login</button>

<p id="loginError" style="color:red;"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<header>Adawe Gas Control</header>

<section class="section">
<h2>Live Dashboard</h2>

<div class="stats">
<div class="stat-box">
<h4>Total Orders</h4>
<p id="totalOrders">0</p>
</div>
<div class="stat-box">
<h4>Pending Orders</h4>
<p id="pendingOrders">0</p>
</div>
<div class="stat-box">
<h4>Total Sellers</h4>
<p id="totalSellers">0</p>
</div>
</div>

<div class="mb-3">
<button id="downloadOrders" class="btn btn-primary btn-download">Download Orders CSV</button>
<button id="downloadSellers" class="btn btn-info btn-download">Download Sellers CSV</button>
</div>

<input type="text" id="searchOrders" class="form-control search-input" placeholder="Search Orders by Name, Location, Brand">
<input type="text" id="searchSellers" class="form-control search-input" placeholder="Search Sellers by Company, Location, Phone, Type">

<h3>Orders</h3>
<table id="ordersTable">
<tr>
<th>Name</th><th>Location</th><th>Brand</th><th>Quantity</th><th>Unit</th><th>Status</th><th>Actions</th>
</tr>
</table>

<h3>Sellers</h3>
<table id="sellersTable">
<tr>
<th>Company</th><th>Location</th><th>Phone</th><th>Business Type</th><th>Actions</th>
</tr>
</table>

</section>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBVhASqIXG5OaVk1nr8c3hZ-_liTg1UIsw",
authDomain: "adawe-gas-system-82187.firebaseapp.com",
projectId: "adawe-gas-system-82187",
storageBucket: "adawe-gas-system-82187.appspot.com",
messagingSenderId: "644303663526",
appId: "1:644303663526:web:bacf9e5db0d7787f705f67"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.login = function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)
.then(()=>{

document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";

fetchDashboard();

})
.catch(()=>{
document.getElementById("loginError").innerText="Login failed";
});

}

async function fetchDashboard(){

const ordersSnap = await getDocs(query(collection(db,"orders"),orderBy("createdAt","desc")));
const ordersTable=document.getElementById("ordersTable");

ordersTable.innerHTML=`<tr>
<th>Name</th><th>Location</th><th>Brand</th><th>Quantity</th><th>Unit</th><th>Status</th><th>Actions</th>
</tr>`;

let totalOrders=0;
let pendingOrders=0;

ordersSnap.forEach(docSnap=>{

const o=docSnap.data();
const tr=document.createElement("tr");

const status=o.status||"Pending";

tr.className=status==="Pending"?"status-pending":"status-delivered";

const actionBtn=status==="Pending"
? `<button class="btn btn-sm btn-delivered mark-delivered">Delivered</button>`
: `<span class="btn btn-sm btn-pending">Delivered</span>`;

tr.innerHTML=`
<td>${o.name}</td>
<td>${o.location}</td>
<td>${o.brand}</td>
<td>${o.quantity}</td>
<td>${o.unit||""}</td>
<td>${status}</td>
<td>${actionBtn} <button class="btn btn-sm btn-danger delete-order">Delete</button></td>
`;

ordersTable.appendChild(tr);

if(status==="Pending"){
tr.querySelector(".mark-delivered").addEventListener("click",async()=>{
await updateDoc(doc(db,"orders",docSnap.id),{status:"Delivered"});
fetchDashboard();
});
}

tr.querySelector(".delete-order").addEventListener("click",async()=>{
if(confirm("Delete order?")){
await deleteDoc(doc(db,"orders",docSnap.id));
fetchDashboard();
}
});

totalOrders++;
if(status==="Pending") pendingOrders++;

});

document.getElementById("totalOrders").textContent=totalOrders;
document.getElementById("pendingOrders").textContent=pendingOrders;

const sellersSnap=await getDocs(collection(db,"sellers"));
const sellersTable=document.getElementById("sellersTable");

sellersTable.innerHTML=`<tr>
<th>Company</th><th>Location</th><th>Phone</th><th>Business Type</th><th>Actions</th>
</tr>`;

sellersSnap.forEach(docSnap=>{

const s=docSnap.data();
const tr=document.createElement("tr");

tr.innerHTML=`
<td>${s.name}</td>
<td>${s.location}</td>
<td>${s.phone}</td>
<td>${s.businessType}</td>
<td><button class="btn btn-sm btn-danger delete-seller">Delete</button></td>
`;

sellersTable.appendChild(tr);

tr.querySelector(".delete-seller").addEventListener("click",async()=>{
if(confirm("Delete seller?")){
await deleteDoc(doc(db,"sellers",docSnap.id));
fetchDashboard();
}
});

});

document.getElementById("totalSellers").textContent=sellersSnap.size;

}

</script>

</body>
</html>
