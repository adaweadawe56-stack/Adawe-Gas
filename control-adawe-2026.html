<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adawe Gas Admin Dashboard PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- 🔥 CHART JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;background:#f7f9fb;font-family:Arial}
.navbar{background:#0b7a3c}
.navbar-brand{color:white!important}
.table-striped th { background:#198754; color:white; }
.pending{background:#fff3cd}
.processing{background:#cfe2ff}
.completed{background:#d1e7dd}
.approved{background:#d4edda}
.rejected{background:#f8d7da}
.stat-box{background:white;padding:15px;border-radius:8px;text-align:center;margin-bottom:10px}
</style>
</head>

<body>

<nav class="navbar">
<div class="container">
<a class="navbar-brand">Adawe Gas Admin</a>
</div>
</nav>

<div id="loginPage" class="container mt-5" style="max-width:400px;">
<h3>Admin Login</h3>
<input id="email" class="form-control mb-2" placeholder="Email">
<input id="password" type="password" class="form-control mb-2" placeholder="Password">
<button onclick="login()" class="btn btn-success w-100">Login</button>
<p id="loginError" style="color:red;"></p>
</div>

<div id="dashboard" style="display:none;" class="container mt-4">

<!-- ✅ STATS -->
<div class="row text-center">
<div class="col-md-3"><div class="stat-box"><h4 id="totalOrders">0</h4><p>Total Orders</p></div></div>
<div class="col-md-3"><div class="stat-box"><h4 id="pendingOrders">0</h4><p>Pending Orders</p></div></div>
<div class="col-md-3"><div class="stat-box"><h4 id="todayOrders">0</h4><p>Today's Orders</p></div></div>
<div class="col-md-3"><div class="stat-box"><h4 id="totalRevenue">0</h4><p>Total Revenue (KES)</p></div></div>
</div>

<!-- 📊 CHART -->
<div class="card p-3 mb-4">
<h5>Sales Overview</h5>
<canvas id="salesChart"></canvas>
</div>

<h3>Orders</h3>

<input id="searchOrders" class="form-control mb-2" placeholder="Search Orders...">

<select id="statusFilter" class="form-select mb-2">
<option value="">All Status</option>
<option value="Pending">Pending</option>
<option value="Processing">Processing</option>
<option value="Completed">Completed</option>
</select>

<table id="ordersTable" class="table table-striped"></table>

<h3 class="mt-4">Sellers</h3>
<table id="sellersTable" class="table table-striped"></table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVhASqIXG5OaVk1nr8c3hZ-_liTg1UIsw",
  authDomain: "adawe-gas-system-82187.firebaseapp.com",
  projectId: "adawe-gas-system-82187",
  storageBucket: "adawe-gas-system-82187.firebasestorage.app",
  messagingSenderId: "644303663526",
  appId: "1:644303663526:web:bacf9e5db0d7787f705f67"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let ordersData=[], sellersData=[];
let chart;

// DATE FORMAT
function formatDate(ts){
 if(!ts) return "";
 const d = ts.toDate ? ts.toDate() : new Date(ts);
 return d.toLocaleString();
}

// LOGIN
window.login = async function(){
 try{
  const userCredential = await signInWithEmailAndPassword(auth,email.value,password.value);
  const uid = userCredential.user.uid;
  const adminDoc = await getDoc(doc(db,"admins",uid));

  if(!adminDoc.exists()){
    loginError.innerText="Not admin";
    return;
  }

  loginPage.style.display="none";
  dashboard.style.display="block";
  startRealtime();

 }catch(err){
  loginError.innerText=err.message;
 }
};

// REALTIME
function startRealtime(){

 onSnapshot(collection(db,"orders"), snap=>{
  ordersData=[];
  snap.forEach(d=>ordersData.push({id:d.id,...d.data()}));
  renderOrders();
  updateStatsAndChart();
 });

 onSnapshot(collection(db,"sellers"), snap=>{
  sellersData=[];
  snap.forEach(d=>sellersData.push({id:d.id,...d.data()}));
  renderSellers();
 });
}

// 🔥 STATS + CHART
function updateStatsAndChart(){

 let total=0,pending=0,today=0,revenue=0;
 const todayDate = new Date().toDateString();

 let dailyMap={};
 let monthlyMap={};

 ordersData.forEach(o=>{
  total++;

  if((o.status||"Pending")==="Pending") pending++;

  if(o.price) revenue += o.price;

  if(o.createdAt){
    const d = o.createdAt.toDate();
    if(d.toDateString() === todayDate) today++;

    const day = d.toLocaleDateString();
    const month = d.getFullYear()+"-"+(d.getMonth()+1);

    dailyMap[day]=(dailyMap[day]||0)+1;
    monthlyMap[month]=(monthlyMap[month]||0)+1;
  }
 });

 document.getElementById("totalOrders").innerText=total;
 document.getElementById("pendingOrders").innerText=pending;
 document.getElementById("todayOrders").innerText=today;
 document.getElementById("totalRevenue").innerText=revenue;

 // CHART (Daily)
 const labels = Object.keys(dailyMap);
 const data = Object.values(dailyMap);

 if(chart) chart.destroy();

 chart = new Chart(document.getElementById("salesChart"),{
  type:"line",
  data:{
    labels:labels,
    datasets:[{
      label:"Orders per Day",
      data:data,
      fill:false,
      tension:0.3
    }]
  }
 });

}

// ORDERS
function renderOrders(){
 const search = document.getElementById("searchOrders").value.toLowerCase();
 const statusFilter = document.getElementById("statusFilter").value;

 ordersTable.innerHTML=`<tr>
 <th>Name</th><th>Phone</th><th>Qty</th><th>Brand</th><th>Status</th><th>Date</th><th>Actions</th></tr>`;

 ordersData.forEach(o=>{
  if(search && !JSON.stringify(o).toLowerCase().includes(search)) return;
  if(statusFilter && (o.status||"Pending") !== statusFilter) return;

  ordersTable.innerHTML+=`
  <tr>
  <td>${o.name||""}</td>
  <td>${o.phone||""}</td>
  <td>${o.quantity||""}</td>
  <td>${o.brand||""}</td>
  <td class="${(o.status||"pending").toLowerCase()}">${o.status||"pending"}</td>
  <td>${formatDate(o.createdAt)}</td>
  <td>
  <select onchange="updateOrderStatus('${o.id}',this.value)" class="form-select form-select-sm">
    <option ${o.status=="Pending"?"selected":""}>Pending</option>
    <option ${o.status=="Processing"?"selected":""}>Processing</option>
    <option ${o.status=="Completed"?"selected":""}>Completed</option>
  </select>
  <button onclick="editOrder('${o.id}')" class="btn btn-primary btn-sm mt-1">Edit</button>
  <button onclick="deleteOrder('${o.id}')" class="btn btn-danger btn-sm mt-1">Delete</button>
  </td>
  </tr>`;
 });
}

// SELLERS
function renderSellers(){
 sellersTable.innerHTML=`<tr>
 <th>Name</th><th>Phone</th><th>Location</th><th>6kg</th><th>13kg</th><th>Status</th><th>Date</th><th>Actions</th></tr>`;

 sellersData.forEach(s=>{
  sellersTable.innerHTML+=`
  <tr>
  <td>${s.name||""}</td>
  <td>${s.phone||""}</td>
  <td>${s.location||""}</td>
  <td>${s.price6||""}</td>
  <td>${s.price13||""}</td>
  <td class="${(s.status||"pending").toLowerCase()}">${s.status||"pending"}</td>
  <td>${formatDate(s.createdAt)}</td>
  <td>
  ${(s.status||"").toLowerCase()==="pending" ? `<button onclick="approveSeller('${s.id}')" class="btn btn-success btn-sm">Approve</button>`:""}
  <select onchange="updateSellerStatus('${s.id}',this.value)" class="form-select form-select-sm mt-1">
    <option ${s.status=="pending"?"selected":""}>pending</option>
    <option ${s.status=="approved"?"selected":""}>approved</option>
    <option ${s.status=="rejected"?"selected":""}>rejected</option>
  </select>
  <button onclick="editSeller('${s.id}')" class="btn btn-primary btn-sm mt-1">Edit</button>
  <button onclick="deleteSeller('${s.id}')" class="btn btn-danger btn-sm mt-1">Delete</button>
  </td>
  </tr>`;
 });
}

// EVENTS
document.getElementById("searchOrders").addEventListener("input",renderOrders);
document.getElementById("statusFilter").addEventListener("change",renderOrders);

// ACTIONS
window.deleteOrder=id=>confirm("Delete?")&&deleteDoc(doc(db,"orders",id));
window.deleteSeller=id=>confirm("Delete?")&&deleteDoc(doc(db,"sellers",id));

window.updateOrderStatus = async (id,status)=>{ await updateDoc(doc(db,"orders",id),{status}); };
window.updateSellerStatus = async (id,status)=>{ await updateDoc(doc(db,"sellers",id),{status}); };

window.approveSeller = async id=>{
 await updateDoc(doc(db,"sellers",id),{status:"approved"});
 alert("Approved");
};

// EDIT
window.editSeller = async id=>{
 const s=sellersData.find(x=>x.id==id);
 const name=prompt("Name",s.name);
 const phone=prompt("Phone",s.phone);
 const location=prompt("Location",s.location);
 const price6=prompt("6kg",s.price6);
 const price13=prompt("13kg",s.price13);

 await updateDoc(doc(db,"sellers",id),{
  name,phone,location,
  price6:parseInt(price6),
  price13:parseInt(price13)
 });
};

window.editOrder = async id=>{
 const o=ordersData.find(x=>x.id==id);
 const name=prompt("Name",o.name);
 const phone=prompt("Phone",o.phone);
 const quantity=prompt("Qty",o.quantity);
 const brand=prompt("Brand",o.brand);

 await updateDoc(doc(db,"orders",id),{
  name,phone,
  quantity:parseInt(quantity),
  brand
 });
};
</script>

</body>
</html>
