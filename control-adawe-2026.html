<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adawe Gas Admin Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
/* Dashboard CSS same as before */
</style>
</head>
<body>
<div id="loginPage" class="container mt-5" style="max-width:400px;">
<h3 class="text-center mb-3">Admin Login</h3>
<input id="email" type="email" class="form-control mb-2" placeholder="Email">
<input id="password" type="password" class="form-control mb-2" placeholder="Password">
<button onclick="login()" class="btn btn-success w-100">Login</button>
<p id="loginError" style="color:red;"></p>
</div>

<div id="dashboard" style="display:none;">
<header class="bg-success text-white text-center p-3">Adawe Gas Control</header>
<div class="section">
<div class="stats d-flex gap-3 mb-4">
<div class="stat-box flex-1 text-center bg-white shadow p-3"><h4 id="totalOrders">0</h4><p>Total Orders</p></div>
<div class="stat-box flex-1 text-center bg-white shadow p-3"><h4 id="pendingOrders">0</h4><p>Pending Orders</p></div>
</div>

<h3>Orders</h3>
<input type="text" id="searchOrders" class="form-control mb-2" placeholder="Search Orders...">
<table id="ordersTable" class="table table-striped"></table>

<h3>Sellers</h3>
<input type="text" id="searchSellers" class="form-control mb-2" placeholder="Search Sellers...">
<table id="sellersTable" class="table table-striped"></table>

<h3>📍 Sellers Map</h3>
<div id="map" style="height:400px;"></div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
 apiKey: "AIzaSyBVhASqIXG5OaVk1nr8c3hZ-_liTg1UIsw",
 authDomain: "adawe-gas-system-82187.firebaseapp.com",
 projectId: "adawe-gas-system-82187",
 storageBucket: "adawe-gas-system-82187.appspot.com",
 messagingSenderId: "644303663526",
 appId: "1:644303663526:web:bacf9e5db0d7787f705f67"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let map, markers = [];
function initMap(){ map = L.map('map').setView([-1.28,36.81],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap'}).addTo(map); }

window.login = function(){
 const email = document.getElementById("email").value;
 const password = document.getElementById("password").value;
 signInWithEmailAndPassword(auth,email,password).then(()=>{
  document.getElementById("loginPage").style.display="none";
  document.getElementById("dashboard").style.display="block";
  initMap();
  startRealtime();
 }).catch(()=>{ document.getElementById("loginError").innerText="Login failed"; });
}

function startRealtime(){
 onSnapshot(collection(db,"orders"),snapshot=>{
   const data=[]; snapshot.forEach(doc=>data.push(doc.data()));
   document.getElementById("totalOrders").innerText=data.length;
   document.getElementById("pendingOrders").innerText=data.filter(o=>o.status==="Pending").length;
   const table=document.getElementById("ordersTable"); table.innerHTML=`<tr><th>Name</th><th>Phone</th><th>Location</th><th>Brand</th><th>Qty</th><th>Status</th></tr>`;
   data.forEach(o=>{ const tr=document.createElement("tr"); tr.innerHTML=`<td>${o.name}</td><td>${o.phone}</td><td>${o.location}</td><td>${o.brand}</td><td>${o.quantity}</td><td>${o.status}</td>`; table.appendChild(tr); });
 });

 onSnapshot(collection(db,"sellers"),snapshot=>{
   const data=[]; snapshot.forEach(doc=>data.push(doc.data()));
   const table=document.getElementById("sellersTable"); table.innerHTML=`<tr><th>Name</th><th>Location</th><th>6kg</th><th>13kg</th><th>Status</th></tr>`;
   markers.forEach(m=>map.removeLayer(m)); markers=[];
   data.forEach(s=>{ 
     const tr=document.createElement("tr"); 
     tr.innerHTML=`<td>${s.name}</td><td>${s.location||'-'}</td><td>${s.price6||'-'}</td><td>${s.price13||'-'}</td><td>${s.status||'-'}</td>`;
     table.appendChild(tr);
     if(s.lat && s.lng && s.status==="approved"){ const m=L.marker([s.lat,s.lng]).addTo(map); markers.push(m);}
   });
 });
}
</script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</body>
</html>
