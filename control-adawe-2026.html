<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adawe Gas Full System</title>

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{font-family:'Poppins',sans-serif}
body{margin:0;background:#f7f9fb}

/* NAVBAR */
.navbar{background:#0b7a3c}
.navbar-brand,.nav-link{color:white!important}

/* HERO */
.hero{
background:linear-gradient(135deg,#28a745,#1e7f34);
color:white;
padding:140px 0;
border-bottom-left-radius:40px;
border-bottom-right-radius:40px;
text-align:center;
}
.hero h1{font-size:42px;font-weight:700}
.btn-main{background:white;color:#28a745;padding:14px 30px;border-radius:30px;font-weight:600}

/* SECTION */
.section{padding:80px 0}

/* CARD */
.card-modern{
border:none;border-radius:20px;padding:30px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);background:white;
}

/* FORM */
.form-control,.form-select{border-radius:12px;padding:12px}

/* MAP */
#mapArea,#map{height:400px;border-radius:20px;}

/* FOOTER */
footer{background:#0b7a3c;color:white;padding:20px;text-align:center}

/* DASHBOARD */
header { background:#0f7b3f; color:white; text-align:center; padding:20px; font-size:1.8em; font-weight:bold; }
.stats { display:flex; gap:20px; margin-top:20px; }
.stat-box { background:white; padding:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); flex:1; text-align:center; }
.table-striped th { background:#198754; color:white; }
.search-input { margin-bottom:10px; width:100%; padding:6px 8px; }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand">Adawe Gas</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<h1>Fast & Reliable Gas Delivery</h1>
<a href="#order" class="btn btn-main mt-3">Order Now</a>
</section>

<!-- CUSTOMER ORDER -->
<section class="section" id="order">
<div class="container">
<h2 class="text-center mb-4">Place Order</h2>
<form id="orderForm" class="col-md-6 mx-auto card-modern">
<input class="form-control mb-3" id="name" placeholder="Name" required>
<input class="form-control mb-3" id="phone" placeholder="Phone" required>
<input class="form-control mb-3" id="location" placeholder="Location" required>
<input class="form-control mb-3" id="quantity" type="number" placeholder="Quantity" required>
<select class="form-select mb-3" id="brand" required>
<option value="">Select Brand</option>
<option>K-Gas</option>
<option>AfriGas</option>
<option>Total</option>
</select>
<button class="btn btn-success w-100">Send Order</button>
<a id="whatsappBtn" target="_blank" class="btn w-100 mt-2" style="background:#25D366;color:white;">📲 Order via WhatsApp</a>
<p id="trackingNumber" class="mt-3 text-success fw-bold"></p>
</form>
</div>
</section>

<!-- SELLER REGISTRATION -->
<section class="section" id="seller">
<div class="container">
<h2 class="text-center mb-4">Register Seller</h2>
<form id="sellerForm" class="col-md-6 mx-auto card-modern">
<input id="sellerName" class="form-control mb-3" placeholder="Company Name" required>
<button type="button" onclick="getLocation()" class="btn btn-secondary mb-3 w-100">Detect Location</button>
<input id="sellerPrice6" type="number" class="form-control mb-3" placeholder="6kg Price">
<input id="sellerPrice13" type="number" class="form-control mb-3" placeholder="13kg Price">
<button class="btn btn-primary w-100">Register</button>
</form>
</div>
</section>

<!-- CUSTOMER MAP -->
<section class="section">
<div class="container">
<h2 class="text-center mb-4">Nearby Sellers</h2>
<div id="mapArea"></div>
</div>
</section>

<footer>
<p>© 2026 Adawe Gas</p>
</footer>

<!-- ADMIN DASHBOARD -->
<div id="loginPage" class="container mt-5" style="max-width:400px;">
  <h3 class="text-center mb-3">Admin Login</h3>
  <input id="email" type="email" class="form-control mb-2" placeholder="Email">
  <input id="password" type="password" class="form-control mb-2" placeholder="Password">
  <button onclick="login()" class="btn btn-success w-100">Login</button>
  <p id="loginError" style="color:red;"></p>
</div>

<div id="dashboard" style="display:none;">
<header>Adawe Gas Control</header>
<div class="section">
<div class="stats d-flex gap-3 mb-4">
<div class="stat-box flex-1 text-center" style="background:white"><h4 id="totalOrders">0</h4><p>Total Orders</p></div>
<div class="stat-box flex-1 text-center" style="background:white"><h4 id="pendingOrders">0</h4><p>Pending Orders</p></div>
</div>

<h3>Orders</h3>
<input type="text" id="searchOrders" class="search-input" placeholder="Search Orders...">
<table id="ordersTable" class="table table-striped"></table>

<h3>Sellers</h3>
<input type="text" id="searchSellers" class="search-input" placeholder="Search Sellers...">
<table id="sellersTable" class="table table-striped"></table>

<h3>📍 Sellers Map</h3>
<div id="map" ></div>
</div>
</div>

<!-- SCRIPTS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBVhASqIXG5OaVk1nr8c3hZ-_liTg1UIsw",
  authDomain: "adawe-gas-system-82187.firebaseapp.com",
  projectId: "adawe-gas-system-82187",
  storageBucket: "adawe-gas-system-82187.appspot.com",
  messagingSenderId: "644303663526",
  appId: "1:644303663526:web:bacf9e5db0d7787f705f67"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// TRACKING
function generateTracking(){ return "AG"+Math.floor(100000+Math.random()*900000); }

// LOCATION
let sellerLat=null, sellerLng=null;
function getLocation(){
 navigator.geolocation.getCurrentPosition(pos=>{
  sellerLat=pos.coords.latitude;
  sellerLng=pos.coords.longitude;
  alert("Location detected!");
 });
}

// CUSTOMER ORDER FORM
document.getElementById("orderForm").addEventListener("submit", function(e){
 e.preventDefault();
 const name=document.getElementById("name").value;
 const phone=document.getElementById("phone").value;
 const location=document.getElementById("location").value;
 const quantity=document.getElementById("quantity").value;
 const brand=document.getElementById("brand").value;
 if(!name||!phone||!location||!quantity||!brand){ alert("Fill all fields"); return; }
 const tracking=generateTracking();
 db.collection("orders").add({name,phone,location,quantity:parseInt(quantity),brand,tracking,status:"Pending",createdAt:new Date()})
 .then(()=>{
   document.getElementById("trackingNumber").innerText="Tracking: "+tracking;
   window.open(`https://wa.me/254727015434?text=${encodeURIComponent(`New Order:\nName:${name}\nPhone:${phone}\nLocation:${location}\nQty:${quantity}\nBrand:${brand}\nTracking:${tracking}`)}`);
   document.getElementById("orderForm").reset();
 });
});

// WHATSAPP BUTTON
document.getElementById("whatsappBtn").addEventListener("click",function(){
 const name=document.getElementById("name").value;
 const phone=document.getElementById("phone").value;
 const location=document.getElementById("location").value;
 const quantity=document.getElementById("quantity").value;
 const brand=document.getElementById("brand").value;
 if(!name||!phone||!location||!quantity||!brand){ alert("Fill form first"); return; }
 this.href=`https://wa.me/254727015434?text=${encodeURIComponent(`New Order:\nName:${name}\nPhone:${phone}\nLocation:${location}\nQty:${quantity}\nBrand:${brand}`)}`;
});

// SELLER FORM
document.getElementById("sellerForm").addEventListener("submit", function(e){
 e.preventDefault();
 const name=document.getElementById("sellerName").value;
 const price6=document.getElementById("sellerPrice6").value;
 const price13=document.getElementById("sellerPrice13").value;
 if(!sellerLat||!sellerLng){ alert("Click Detect Location first"); return; }
 db.collection("sellers").add({name,price6:price6?parseInt(price6):null,price13:price13?parseInt(price13):null,lat:sellerLat,lng:sellerLng,status:"pending",createdAt:new Date()})
 .then(()=>{ alert("Seller registered!"); document.getElementById("sellerForm").reset(); sellerLat=null;sellerLng=null; loadSellersOnMap(); });
});

// CUSTOMER MAP
const mapArea=L.map('mapArea').setView([-1.28,36.81],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapArea);
let sellerMarkers = L.layerGroup().addTo(mapArea);
function loadSellersOnMap(){
 sellerMarkers.clearLayers();
 db.collection("sellers").get().then(snapshot=>{
  snapshot.forEach(doc=>{
   const data=doc.data();
   if(data.lat && data.lng){ L.marker([data.lat,data.lng]).bindPopup(`<b>${data.name}</b><br>6kg:${data.price6||'-'}<br>13kg:${data.price13||'-'}`).addTo(sellerMarkers); }
  });
 });
}
loadSellersOnMap();

// ADMIN DASHBOARD MAP
let map;
let markers=[];
function initMap(){ map=L.map('map').setView([-1.28,36.81],10); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap'}).addTo(map); }

// ADMIN LOGIN
window.login=function(){
 const email=document.getElementById("email").value;
 const password=document.getElementById("password").value;
 auth.signInWithEmailAndPassword(email,password).then(()=>{
  document.getElementById("loginPage").style.display="none";
  document.getElementById("dashboard").style.display="block";
  initMap();
  startRealtime();
 }).catch(()=>{ document.getElementById("loginError").innerText="Login failed"; });
}

// ADMIN REALTIME
function startRealtime(){
 onSnapshot(db.collection("orders"),snapshot=>{
  const data=[]; snapshot.forEach(doc=>data.push(doc.data()));
  document.getElementById("totalOrders").innerText=data.length;
  document.getElementById("pendingOrders").innerText=data.filter(o=>o.status==="Pending").length;
  const table=document.getElementById("ordersTable");
  table.innerHTML=`<tr><th>Name</th><th>Phone</th><th>Location</th><th>Brand</th><th>Qty</th><th>Status</th></tr>`;
  data.forEach(o=>{ const tr=document.createElement("tr"); tr.innerHTML=`<td>${o.name}</td><td>${o.phone}</td><td>${o.location}</td><td>${o.brand}</td><td>${o.quantity}</td><td>${o.status}</td>`; table.appendChild(tr); });
 });

 onSnapshot(db.collection("sellers"),snapshot=>{
  const data=[]; snapshot.forEach(doc=>data.push(doc.data()));
  const table=document.getElementById("sellersTable");
  table.innerHTML=`<tr><th>Name</th><th>Location</th><th>6kg</th><th>13kg</th><th>Status</th></tr>`;
  markers.forEach(m=>map.removeLayer(m)); markers=[];
  data.forEach(s=>{
   const tr=document.createElement("tr");
   tr.innerHTML=`<td>${s.name}</td><td>${s.location||'-'}</td><td>${s.price6||'-'}</td><td>${s.price13||'-'}</td><td>${s.status||'-'}</td>`;
   table.appendChild(tr);
   if(s.lat && s.lng && s.status==="approved"){ const m=L.marker([s.lat,s.lng]).addTo(map); markers.push(m);}
  });
 });
}
</script>

</body>
</html>
