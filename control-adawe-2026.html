<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Adawe Gas Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Firebase SDKs (COMPAT – STABLE) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f6f8; }
    header { background: #0b6623; color: white; padding: 15px; text-align: center; }
    .container { padding: 20px; max-width: 1100px; margin: auto; }
    .hidden { display: none; }
    .card { background: white; padding: 15px; margin-bottom: 20px; border-radius: 6px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    input, button { padding: 10px; margin: 5px 0; width: 100%; }
    button { background: #0b6623; color: white; border: none; cursor: pointer; }
    button:hover { opacity: 0.9; }
    table { width: 100%; border-collapse: collapse; }
    table th, table td { border: 1px solid #ddd; padding: 8px; }
    table th { background: #e8f5e9; }
    .logout { background: darkred; margin-top: 10px; }
  </style>
</head>

<body>

<header>
  <h1>Adawe Gas – Admin Dashboard</h1>
</header>

<div class="container">

  <!-- LOGIN -->
  <div id="loginCard" class="card">
    <h2>Admin Login</h2>
    <input type="email" id="email" placeholder="Admin Email" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="login()">Login</button>
    <p id="loginError" style="color:red;"></p>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden">

    <div class="card">
      <h2>Welcome, Admin</h2>
      <button class="logout" onclick="logout()">Logout</button>
    </div>

    <!-- ORDERS -->
    <div class="card">
      <h3>Orders</h3>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Brand</th>
            <th>Quantity</th>
            <th>Unit</th>
            <th>Location</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="ordersTable"></tbody>
      </table>
    </div>

    <!-- PARTNERS -->
    <div class="card">
      <h3>Partners</h3>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Location</th>
            <th>Joined</th>
          </tr>
        </thead>
        <tbody id="partnersTable"></tbody>
      </table>
    </div>

  </div>
</div>

<script>
  // ✅ FIREBASE CONFIG (SAX AH – HA BADALIN)
  const firebaseConfig = {
    apiKey: "AIzaSyBVhASqIXG5OaVk1nr8c3hZ-_liTg1UIsw",
    authDomain: "adawe-gas-system-82187.firebaseapp.com",
    projectId: "adawe-gas-system-82187",
    storageBucket: "adawe-gas-system-82187.firebasestorage.app",
    messagingSenderId: "644303663526",
    appId: "1:644303663526:web:bacf9e5db0d7787f705f67"
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();

  function login() {
    auth.signInWithEmailAndPassword(
      document.getElementById("email").value,
      document.getElementById("password").value
    ).catch(err => {
      document.getElementById("loginError").innerText = err.message;
    });
  }

  function logout() {
    auth.signOut();
  }

  auth.onAuthStateChanged(user => {
    if (user) {
      loginCard.classList.add("hidden");
      dashboard.classList.remove("hidden");
      loadOrders();
      loadPartners();
    } else {
      dashboard.classList.add("hidden");
      loginCard.classList.remove("hidden");
    }
  });

  function loadOrders() {
    db.collection("orders").orderBy("createdAt", "desc")
      .onSnapshot(snapshot => {
        ordersTable.innerHTML = "";
        snapshot.forEach(doc => {
          const d = doc.data();
          ordersTable.innerHTML += `
            <tr>
              <td>${d.name || ""}</td>
              <td>${d.brand || ""}</td>
              <td>${d.quantity || ""}</td>
              <td>${d.unit || ""}</td>
              <td>${d.location || ""}</td>
              <td>${d.createdAt?.toDate().toLocaleString() || ""}</td>
            </tr>`;
        });
      });
  }

  function loadPartners() {
    db.collection("partners").orderBy("createdAt", "desc")
      .onSnapshot(snapshot => {
        partnersTable.innerHTML = "";
        snapshot.forEach(doc => {
          const d = doc.data();
          partnersTable.innerHTML += `
            <tr>
              <td>${d.name || ""}</td>
              <td>${d.location || ""}</td>
              <td>${d.createdAt?.toDate().toLocaleString() || ""}</td>
            </tr>`;
        });
      });
  }
</script>

</body>
</html>
