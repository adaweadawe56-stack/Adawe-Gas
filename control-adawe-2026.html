<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVhASqIXG5OaVk1nr8c3hZ-_liTg1UIsw",
  authDomain: "adawe-gas-system-82187.firebaseapp.com",
  projectId: "adawe-gas-system-82187",
  storageBucket: "adawe-gas-system-82187.firebasestorage.app",
  messagingSenderId: "644303663526",
  appId: "1:644303663526:web:bacf9e5db0d7787f705f67"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// ===== ADMIN SYSTEM =====
let currentAdminRole = null;

async function checkAdminAccess(user){

const snapshot = await getDocs(collection(db,"admins"));

let found = false;

snapshot.forEach(docSnap=>{
const data = docSnap.data();

if(data.email === user.email){
found = true;
currentAdminRole = data.role;
}
});

if(!found){
alert("Not authorized");
location.reload();
}

}

// ===== LOGIN =====
window.login = function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)
.then(async(res)=>{

await checkAdminAccess(res.user);

document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";

showRole();
startRealtime();
addTestOrders(); // 🔥 muhiim

})
.catch(()=>{
document.getElementById("loginError").innerText="Login failed";
});

}

// ===== SHOW ROLE =====
function showRole(){
const header = document.querySelector("header");

const role = document.createElement("div");
role.style.fontSize="14px";
role.innerHTML = "Role: " + currentAdminRole;

header.appendChild(role);
}

// ===== REALTIME =====
function startRealtime(){

onSnapshot(collection(db,"orders"), snapshot=>{

const table=document.getElementById("ordersTable");

table.innerHTML=`
<tr>
<th>Name</th><th>Phone</th><th>Location</th><th>Brand</th>
<th>Quantity</th><th>Status</th><th>Actions</th>
</tr>`;

let total=0,pending=0;

snapshot.forEach(docSnap=>{

const o=docSnap.data();
const status=o.status||"Pending";

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${o.name}</td>
<td>${o.phone||"-"}</td>
<td>${o.location}</td>
<td>${o.brand}</td>
<td>${o.quantity}</td>
<td>${status}</td>
<td>
${status==="Pending"
? `<button class="btn btn-sm btn-success deliver">Delivered</button>`
: `Delivered`}
<button class="btn btn-sm btn-danger delete">Delete</button>
</td>
`;

table.appendChild(tr);

// DELIVER
if(status==="Pending"){
tr.querySelector(".deliver").onclick=async()=>{
await updateDoc(doc(db,"orders",docSnap.id),{status:"Delivered"});
};
}

// DELETE (SUPER ONLY)
tr.querySelector(".delete").onclick=async()=>{

if(currentAdminRole !== "super"){
alert("Only Super Admin can delete");
return;
}

if(confirm("Delete order?")){
await deleteDoc(doc(db,"orders",docSnap.id));
}

};

total++;
if(status==="Pending") pending++;

});

document.getElementById("totalOrders").innerText=total;
document.getElementById("pendingOrders").innerText=pending;

});

// ===== SELLERS =====
onSnapshot(collection(db,"sellers"), snapshot=>{

const table=document.getElementById("sellersTable");

table.innerHTML=`
<tr>
<th>Company</th><th>Location</th><th>Phone</th>
<th>6kg</th><th>13kg</th><th>Type</th><th>Actions</th>
</tr>`;

snapshot.forEach(docSnap=>{

const s=docSnap.data();

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${s.name}</td>
<td>${s.location}</td>
<td>${s.phone}</td>
<td>${s.price6||"-"}</td>
<td>${s.price13||"-"}</td>
<td>${s.businessType}</td>
<td><button class="btn btn-sm btn-danger delete">Delete</button></td>
`;

table.appendChild(tr);

// DELETE (SUPER ONLY)
tr.querySelector(".delete").onclick=async()=>{

if(currentAdminRole !== "super"){
alert("Only Super Admin only");
return;
}

if(confirm("Delete seller?")){
await deleteDoc(doc(db,"sellers",docSnap.id));
}

};

});

});

}

</script>
