<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adawe Gas Admin Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f4f4; font-family:Arial; }
.header { background:#0f7b3f; color:white; padding:20px; text-align:center; }
.card { border-radius:12px; }
</style>
</head>

<body>

<div class="header">
<h2>Adawe Gas – Admin Dashboard</h2>
</div>

<div class="container mt-4">

<div class="row text-center mb-4">
<div class="col-md-6">
<div class="card p-3 shadow">
<h4>Total Orders</h4>
<h2 id="orderCount">0</h2>
</div>
</div>

<div class="col-md-6">
<div class="card p-3 shadow">
<h4>Total Partners</h4>
<h2 id="partnerCount">0</h2>
</div>
</div>
</div>

<h4>Orders List</h4>
<table class="table table-bordered bg-white">
<thead>
<tr>
<th>Name</th>
<th>Location</th>
<th>Brand</th>
<th>Quantity</th>
<th>Date</th>
</tr>
</thead>
<tbody id="ordersTable"></tbody>
</table>

<h4 class="mt-5">Partners List</h4>
<table class="table table-bordered bg-white">
<thead>
<tr>
<th>Name</th>
<th>Location</th>
<th>Phone</th>
<th>Brand</th>
<th>Date</th>
</tr>
</thead>
<tbody id="partnersTable"></tbody>
</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVhASqIXG5OaVk1nr8c3hZ-_liTg1UIsw",
  authDomain: "adawe-gas-system-82187.firebaseapp.com",
  projectId: "adawe-gas-system-82187",
  storageBucket: "adawe-gas-system-82187.firebasestorage.app",
  messagingSenderId: "644303663526",
  appId: "1:644303663526:web:bacf9e5db0d7787f705f67"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ORDERS
const ordersTable = document.getElementById("ordersTable");
const orderCount = document.getElementById("orderCount");

onSnapshot(collection(db, "orders"), (snapshot) => {
ordersTable.innerHTML = "";
orderCount.innerText = snapshot.size;

snapshot.forEach(doc => {
const data = doc.data();
ordersTable.innerHTML += `
<tr>
<td>${data.name}</td>
<td>${data.location}</td>
<td>${data.brand}</td>
<td>${data.quantity} ${data.unit}</td>
<td>${new Date(data.createdAt.seconds*1000).toLocaleString()}</td>
</tr>
`;
});
});

// PARTNERS
const partnersTable = document.getElementById("partnersTable");
const partnerCount = document.getElementById("partnerCount");

onSnapshot(collection(db, "partners"), (snapshot) => {
partnersTable.innerHTML = "";
partnerCount.innerText = snapshot.size;

snapshot.forEach(doc => {
const data = doc.data();
partnersTable.innerHTML += `
<tr>
<td>${data.name}</td>
<td>${data.location}</td>
<td>${data.phone}</td>
<td>${data.brand}</td>
<td>${new Date(data.createdAt.seconds*1000).toLocaleString()}</td>
</tr>
`;
});
});

</script>

</body>
</html>
