<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adawe Gas – LPG Delivery Kenya</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { font-family: Arial; scroll-behavior:smooth; }
.navbar { background:#0f7b3f; }
.navbar a { color:white !important; font-weight:bold; }
.section { padding:80px 20px; }
.hero { background:linear-gradient(135deg,#0f5132,#198754); color:white; padding:120px 20px; text-align:center; }
.footer { background:#0f7b3f; color:white; text-align:center; padding:20px; }
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg fixed-top">
<div class="container">
<a class="navbar-brand text-white" href="#home">Adawe Gas</a>
<button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#menu">☰</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
<li class="nav-item"><a class="nav-link" href="#order">Order</a></li>
<li class="nav-item"><a class="nav-link" href="#partner">Partner</a></li>
<li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
</ul>
</div>
</div>
</nav>

<section class="hero" id="home">
<h1>Kenya’s Fast Growing LPG Delivery Network</h1>
<p>Fast • Safe • Reliable</p>
<a href="#order" class="btn btn-light mt-3">Order Now</a>
</section>

<!-- ORDER SECTION -->
<section class="section bg-light" id="order">
<div class="container">
<h2 class="text-center">Place Order</h2>

<form id="orderForm" class="col-md-6 mx-auto">

<input class="form-control mb-2" id="name" placeholder="Name" required>
<input class="form-control mb-2" id="location" placeholder="Location" required>
<input class="form-control mb-2" id="quantity" type="number" placeholder="Quantity" required>

<select class="form-select mb-2" id="unit" required>
<option value="">Select Unit</option>
<option>Kgs</option>
<option>Cylinder(s)</option>
</select>

<select class="form-select mb-3" id="brand" required>
<option value="">Select Gas Brand</option>
<option>K-Gas</option>
<option>AfriGas</option>
<option>Pro Gas</option>
<option>TotalEnergies</option>
<option>Hashi Gas</option>
<option>Lake Gas</option>
<option>Oil Libya (OLA Gas)</option>
<option>Rubis Gas</option>
<option>Taifa Gas</option>
<option>Marangi</option>
<option>National Oil Gas</option>
</select>

<button class="btn btn-success w-100">Send Order</button>
</form>
</div>
</section>

<!-- PARTNER SECTION -->
<section class="section" id="partner">
<div class="container">
<h2 class="text-center">Register as Partner</h2>

<form id="partnerForm" class="col-md-6 mx-auto">

<input class="form-control mb-2" id="pname" placeholder="Company Name" required>
<input class="form-control mb-2" id="plocation" placeholder="Location" required>
<input class="form-control mb-2" id="pphone" placeholder="Phone" required>

<select class="form-select mb-3" id="pbrand" required>
<option value="">Select Brand</option>
<option>K-Gas</option>
<option>AfriGas</option>
<option>Pro Gas</option>
<option>TotalEnergies</option>
<option>Hashi Gas</option>
<option>Lake Gas</option>
<option>Oil Libya (OLA Gas)</option>
<option>Rubis Gas</option>
<option>Taifa Gas</option>
<option>Marangi</option>
<option>National Oil Gas</option>
</select>

<button class="btn btn-primary w-100">Register Partner</button>
</form>
</div>
</section>

<section class="section bg-light" id="contact">
<div class="container text-center">
<h2>Contact</h2>
<p>📞 0727 015 434</p>
<p>📍 Nairobi, Kenya</p>
</div>
</section>

<footer class="footer">
© 2026 Adawe Gas – All Rights Reserved
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVhASqIXG5OaVk1nr8c3hZ-_liTg1UIsw",
  authDomain: "adawe-gas-system-82187.firebaseapp.com",
  projectId: "adawe-gas-system-82187",
  storageBucket: "adawe-gas-system-82187.firebasestorage.app",
  messagingSenderId: "644303663526",
  appId: "1:644303663526:web:bacf9e5db0d7787f705f67"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ORDER SAVE
document.getElementById("orderForm").addEventListener("submit", async (e) => {
e.preventDefault();

const name = document.getElementById("name").value;
const location = document.getElementById("location").value;
const quantity = document.getElementById("quantity").value;
const unit = document.getElementById("unit").value;
const brand = document.getElementById("brand").value;

await addDoc(collection(db, "orders"), {
name, location, quantity, unit, brand,
createdAt: new Date()
});

const msg = `Hello Adawe Gas,%0AName: ${name}%0ALocation: ${location}%0ABrand: ${brand}%0AOrder: ${quantity} ${unit}`;
window.open("https://wa.me/254727015434?text=" + msg, "_blank");

alert("Order saved successfully!");
});

// PARTNER SAVE
document.getElementById("partnerForm").addEventListener("submit", async (e) => {
e.preventDefault();

const name = document.getElementById("pname").value;
const location = document.getElementById("plocation").value;
const phone = document.getElementById("pphone").value;
const brand = document.getElementById("pbrand").value;

await addDoc(collection(db, "partners"), {
name, location, phone, brand,
createdAt: new Date()
});

alert("Partner registered successfully!");
});

</script>

</body>
</html>
