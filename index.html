<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adawe Gas – LPG Delivery Kenya</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { font-family: Arial, sans-serif; scroll-behavior:smooth; }
.navbar { background:#0f7b3f; }
.navbar a { color:#fff !important; font-weight:600; }

.hero {
  background: linear-gradient(135deg,#0f5132,#198754);
  color:white;
  padding:110px 20px;
  text-align:center;
}

.section { padding:70px 20px; }
.section h2 { color:#0f7b3f; margin-bottom:30px; }

.service-box {
  background:#f8f9fa;
  padding:25px;
  border-radius:10px;
}

.review-card {
  background:#f4f4f4;
  padding:20px;
  border-radius:8px;
  margin-bottom:15px;
}

.footer {
  background:#0f7b3f;
  color:white;
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="navbar-brand text-white" href="#">Adawe Gas</a>
  </div>
</nav>

<section class="hero">
  <h1>Kenya’s Fastest Growing LPG Delivery Network</h1>
  <p>Fast • Safe • Reliable Gas Delivery Across Kenya</p>
  <a href="#order" class="btn btn-light mt-3">Order Now</a>
</section>

<section class="section bg-light" id="order">
  <div class="container">
    <h2 class="text-center">Place Order</h2>

    <form id="orderForm" class="col-md-6 mx-auto">

      <input class="form-control mb-2" id="name" placeholder="Name" required>

      <input class="form-control mb-2" id="location" placeholder="Location" required>

      <input class="form-control mb-2" id="quantity" type="number" placeholder="Quantity" required>

      <select class="form-select mb-2" id="unit" required>
        <option value="">Select Unit</option>
        <option>Kgs</option>
        <option>Cylinder(s)</option>
      </select>

      <select class="form-select mb-3" id="brand" required>
        <option value="">Select Gas Brand</option>
        <option>K-Gas</option>
        <option>AfriGas</option>
        <option>Pro Gas</option>
        <option>TotalEnergies</option>
        <option>Hashi Gas</option>
        <option>Lake Gas</option>
        <option>Oil Libya (OLA Gas)</option>
        <option>Rubis Gas</option>
        <option>Taifa Gas</option>
        <option>Marangi</option>
        <option>National Oil Gas</option>
      </select>

      <button class="btn btn-success w-100">Send via WhatsApp</button>

    </form>
  </div>
</section>

<footer class="footer">
  <p>© 2026 Adawe Gas – All Rights Reserved</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById("orderForm").addEventListener("submit", function(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const loc = document.getElementById("location").value;
  const qty = document.getElementById("quantity").value;
  const unit = document.getElementById("unit").value;
  const brand = document.getElementById("brand").value;

  const msg = `Hello Adawe Gas,%0A
Name: ${name}%0A
Location: ${loc}%0A
Brand: ${brand}%0A
Order: ${qty} ${unit}`;

  window.open("https://wa.me/254727015434?text=" + msg, "_blank");
});
</script>

</body>
</html>
