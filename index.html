<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Adawe Gas MVP</title>
<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}
header{background:#111;color:#fff;padding:15px;text-align:center;}
nav{display:flex;gap:10px;justify-content:center;background:#222;}
nav button{padding:10px;color:#fff;background:#444;border:none;cursor:pointer;}
nav button:hover{background:#666;}
.container{padding:20px;}
.card{background:#fff;padding:15px;margin-bottom:10px;border-radius:8px;}
input,select,button{padding:10px;margin:5px 0;width:100%;}
button.primary{background:#28a745;color:#fff;border:none;cursor:pointer;}
button.danger{background:#c0392b;color:#fff;border:none;cursor:pointer;}
.hidden{display:none;}
</style>
</head>
<body><header>
<h2>Adawe Gas MVP System</h2>
</header><nav>
<button onclick="showTab('customer')">Customer</button>
<button onclick="showTab('admin')">Admin</button>
<button onclick="showTab('seller')">Seller</button>
</nav><div class="container"><!-- CUSTOMER --><div id="customer" class="tab">
<h3>Order Gas</h3>
<div class="card">
<input id="name" placeholder="Your Name" />
<input id="phone" placeholder="Phone" />
<input id="location" placeholder="Location" />
<select id="gasType">
<option>6KG</option>
<option>13KG</option>
</select>
<button class="primary" onclick="placeOrder()">Place Order</button>
</div>
</div><!-- ADMIN --><div id="admin" class="tab hidden">
<h3>Admin Panel</h3>
<div id="orders"></div>
</div><!-- SELLER --><div id="seller" class="tab hidden">
<h3>Seller Panel</h3>
<div id="sellerOrders"></div>
</div></div><script>
let orders = JSON.parse(localStorage.getItem('orders') || '[]');
let sellers = ['Al Amin Gas', 'Quick Gas'];

function save(){
 localStorage.setItem('orders', JSON.stringify(orders));
}

window.showTab = function(tab){
 document.querySelectorAll('.tab').forEach(t=>t.classList.add('hidden'));
 document.getElementById(tab).classList.remove('hidden');
 render();
}

function placeOrder(){
let order = {
 id: Date.now(),
 name: document.getElementById('name').value,
 phone: document.getElementById('phone').value,
 location: document.getElementById('location').value,
 gas: document.getElementById('gasType').value,
 status: 'Pending',
 seller: ''
};
orders.push(order);
save();
alert('Order placed successfully!');
render();
}

function assignSeller(id, seller){
orders = orders.map(o=>o.id===id?{...o,seller, status:'Assigned'}:o);
save();
render();
}

function markDelivered(id){
orders = orders.map(o=>o.id===id?{...o,status:'Delivered'}:o);
save();
render();
}

function render(){

// ADMIN
let adminDiv = document.getElementById('orders');
adminDiv.innerHTML = '';
orders.forEach(o=>{
 adminDiv.innerHTML += `
 <div class='card'>
 <b>${o.name}</b> - ${o.gas}<br>
 ${o.location} | ${o.phone}<br>
 Status: ${o.status}<br>
 <select onchange="assignSeller(${o.id}, this.value)">
 <option>Select Seller</option>
 ${sellers.map(s=><option>${s}</option>).join('')}
 </select>
 </div>
 `;
});

// SELLER
let sellerDiv = document.getElementById('sellerOrders');
sellerDiv.innerHTML = '';
orders.filter(o=>o.seller).forEach(o=>{
 sellerDiv.innerHTML += `
 <div class='card'>
 <b>${o.name}</b> - ${o.gas}<br>
 ${o.location}<br>
 Status: ${o.status}<br>
 <button class='primary' onclick='markDelivered(${o.id})'>Delivered</button>
 </div>
 `;
});
}

render();
</script><script type="module">
// ===== PHASE 2 CONFIG =====
// Replace with your Firebase config

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyBVhASqIXG5OaVk1nr8c3hZ-_liTg1UIsw",

  authDomain: "adawe-gas-system-82187.firebaseapp.com",

  projectId: "adawe-gas-system-82187",

  storageBucket: "adawe-gas-system-82187.appspot.com",

  messagingSenderId: "644303663526",

  appId: "1:644303663526:web:bacf9e5db0d7787f705f67"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== REALTIME DATABASE =====
window.placeOrder = async function(){

const order = {
  name: document.getElementById('name').value,
  phone: document.getElementById('phone').value,
  location: document.getElementById('location').value,
  gas: document.getElementById('gasType').value,
  status: 'Pending',
  seller: '',
  createdAt: new Date().toISOString()
};

await addDoc(collection(db, 'orders'), order);
alert('Order placed successfully!');
}

// ===== LIVE ORDERS =====
const adminDiv = document.getElementById('orders');
const sellerDiv = document.getElementById('sellerOrders');

onSnapshot(collection(db, 'orders'), (snapshot)=>{

adminDiv.innerHTML = '';
sellerDiv.innerHTML = '';

snapshot.forEach((docSnap)=>{

const o = docSnap.data();
const id = docSnap.id;

adminDiv.innerHTML += `
<div class='card'>
<b>${o.name}</b> - ${o.gas}<br>
${o.location} | ${o.phone}<br>
Status: ${o.status}<br>
<select onchange="assignSeller('${id}', this.value)">
<option>Select Seller</option>
<option>Al Amin Gas</option>
<option>Quick Gas</option>
</select>
</div>
`;

if(o.seller){
sellerDiv.innerHTML += `
<div class='card'>
<b>${o.name}</b> - ${o.gas}<br>
${o.location}<br>
Seller: ${o.seller}<br>
Status: ${o.status}<br>
<button class='primary' onclick="markDelivered('${id}')">Delivered</button>
</div>
`;
}

});
});

// ===== ASSIGN SELLER =====
window.assignSeller = async function(id, seller){
const orderRef = doc(db, 'orders', id);
await updateDoc(orderRef, {
  seller: seller,
  status: 'Assigned'
});
}

// ===== DELIVERED =====
window.markDelivered = async function(id){
const orderRef = doc(db, 'orders', id);
await updateDoc(orderRef, {
  status: 'Delivered'
});
}

</script></body>
</html>
