<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adawe Gas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
body{font-family:Arial,sans-serif;margin:0;padding:0}
.navbar{background:#0b7a3c}
.navbar-brand,.nav-link{color:white!important}
.hero{background:#28a745;color:white;padding:160px 0;text-align:left}
.hero h1{font-size:48px;font-weight:bold}
.hero p{font-size:20px;margin-bottom:20px}
.btn-main{background:white;color:#28a745;font-weight:bold;padding:12px 25px;border-radius:8px;text-decoration:none}
.section{padding:70px 0}
.service-card{padding:30px;border-radius:10px;box-shadow:0 0 15px rgba(0,0,0,0.1);background:white;margin-bottom:20px}
footer{background:#0b7a3c;color:white;padding:20px;text-align:center}
#mapArea{height:400px;margin-bottom:30px}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand">Adawe Gas</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
<li class="nav-item"><a class="nav-link" href="#order">Order</a></li>
<li class="nav-item"><a class="nav-link" href="#seller">Register Seller</a></li>
<li class="nav-item"><a class="nav-link" href="#tracking">Track Order</a></li>
<li class="nav-item"><a class="nav-link" href="#map">Map</a></li>
</ul>
</div>
</div>
</nav>

<!-- HERO -->
<section class="hero" id="home">
<div class="container">
<h1>Kenya’s Fast Growing LPG Delivery Network</h1>
<p>Fast • Safe • Reliable gas delivery</p>
<a href="#order" class="btn btn-main btn-lg">Order Gas Now</a>
</div>
</section>

<!-- ORDER -->
<section class="section" id="order">
<div class="container">
<h2 class="text-center">Place Order</h2>
<form id="orderForm" class="col-md-6 mx-auto p-4 shadow-sm rounded bg-light">
<input class="form-control mb-3" id="name" placeholder="Name" required>
<input class="form-control mb-3" id="phone" placeholder="Phone" required>
<input class="form-control mb-3" id="location" placeholder="Location" required>
<input class="form-control mb-3" id="quantity" type="number" placeholder="Quantity" required>
<select class="form-select mb-3" id="brand" required>
<option value="">Select Gas Brand</option>
<option>K-Gas</option><option>AfriGas</option><option>Pro Gas</option>
</select>
<button class="btn btn-success w-100">Send Order</button>
<p id="trackingNumber" class="mt-2 fw-bold text-success"></p>
</form>
</div>
</section>

<!-- SELLER -->
<section class="section bg-light" id="seller">
<div class="container">
<h2 class="text-center">Register Seller</h2>
<form id="sellerForm">
<input id="sellerName" class="form-control mb-3" placeholder="Company Name" required>
<button type="button" onclick="getLocation()" class="btn btn-secondary mb-3 w-100">Detect Location</button>
<input id="sellerPrice6" type="number" class="form-control mb-3" placeholder="6kg Price">
<input id="sellerPrice13" type="number" class="form-control mb-3" placeholder="13kg Price">
<button class="btn btn-primary w-100">Register</button>
</form>
</div>
</section>

<!-- MAP -->
<section class="section" id="map">
<div class="container">
<h2 class="text-center">Map</h2>
<div id="mapArea"></div>
</div>
</section>

<footer><p>© 2026 Adawe Gas</p></footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const firebaseConfig={apiKey:"YOUR_KEY",projectId:"YOUR_ID"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let sellerLat=null,sellerLng=null;

function getLocation(){
 navigator.geolocation.getCurrentPosition(pos=>{
  sellerLat=pos.coords.latitude;
  sellerLng=pos.coords.longitude;
  alert("Location detected");
 });
}

function generateTracking(){
 return "AG"+Math.floor(100000+Math.random()*900000);
}

document.getElementById("orderForm").addEventListener("submit",e=>{
 e.preventDefault();
 const name=document.getElementById("name").value;
 const phone=document.getElementById("phone").value;
 const location=document.getElementById("location").value;
 const quantity=document.getElementById("quantity").value;
 const brand=document.getElementById("brand").value;

 if(quantity<=0) return alert("Invalid quantity");

 const tracking=generateTracking();

 db.collection("orders").add({name,phone,location,quantity,brand,tracking,status:"Pending"})
 .then(()=>{
  document.getElementById("trackingNumber").innerText="Tracking: "+tracking;
 });
});

// MAP
const map=L.map('mapArea').setView([-1.28,36.81],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

</script>

</body>
</html>
