<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adawe Gas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {font-family: Arial;margin:0;}
.navbar {background:#0b7a3c;}
.navbar-brand,.nav-link {color:white!important;}
.section{padding:60px 0;}
.card-modern{background:white;padding:25px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
footer{background:#0b7a3c;color:white;padding:20px;text-align:center;}
button:hover{transform:scale(1.03);transition:0.2s;}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
<div class="container">
<a class="navbar-brand">Adawe Gas</a>
</div>
</nav>

<!-- ORDER -->
<section class="section" id="order">
<div class="container">
<h2 class="text-center mb-4">Place Order</h2>

<form id="orderForm" class="col-md-6 mx-auto card-modern">
<input id="name" class="form-control mb-3" placeholder="Name" required>
<input id="phone" class="form-control mb-3" placeholder="Phone" required>
<input id="location" class="form-control mb-3" placeholder="Location" required>

<select id="brand" class="form-select mb-3" required>
<option value="">Select Brand</option>
<option>K-Gas</option>
<option>AfriGas</option>
<option>TotalEnergies</option>
</select>

<button type="submit" class="btn w-100" style="background:#25D366;color:white;">
Send Order
</button>

<p id="trackingNumber" class="mt-3 text-success fw-bold"></p>
</form>
</div>
</section>

<!-- SELLER -->
<section class="section" id="seller">
<div class="container">
<h2 class="text-center mb-4">Register Seller</h2>

<form id="sellerForm" class="col-md-6 mx-auto card-modern">
<input id="sellerName" class="form-control mb-3" placeholder="Company Name" required>
<input id="sellerPhone" class="form-control mb-3" placeholder="Phone" required>
<input id="sellerLocation" class="form-control mb-3" placeholder="Location" required>

<button type="submit" class="btn btn-primary w-100">Register</button>
</form>
</div>
</section>

<footer class="text-center"><p>© Adawe Gas</p></footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyBVhASqIXG5OaVk1nr8c3hZ-_liTg1UIsw",
 authDomain: "adawe-gas-system-82187.firebaseapp.com",
 projectId: "adawe-gas-system-82187"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// TRACKING
function generateTracking(){
 return "AG"+Math.floor(100000+Math.random()*900000);
}

// GET SELLERS
async function getSellers(){
 const snapshot = await getDocs(collection(db,"sellers"));
 let list = [];
 snapshot.forEach(doc=>{
  list.push(doc.data());
 });
 return list;
}

// ORDER
document.getElementById("orderForm").addEventListener("submit", async e=>{
 e.preventDefault();

 try{
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const location = document.getElementById("location").value;
  const brand = document.getElementById("brand").value;

  const sellers = await getSellers();

  if(sellers.length === 0){
    alert("No sellers available");
    return;
  }

  // AUTO ASSIGN (random)
  const seller = sellers[Math.floor(Math.random()*sellers.length)];

  const tracking = generateTracking();

  await addDoc(collection(db,"orders"),{
    name, phone, location, brand,
    sellerName: seller.name,
    sellerPhone: seller.phone,
    tracking,
    status:"Pending",
    createdAt: serverTimestamp()
  });

  document.getElementById("trackingNumber").innerText =
   "Tracking: "+tracking+" | Seller: "+seller.name;

  // WHATSAPP TO SELLER
  const msg = `New Order:
${name}
${location}
${brand}
Tracking:${tracking}`;

  window.open(`https://wa.me/${seller.phone}?text=${encodeURIComponent(msg)}`);

  e.target.reset();

 }catch(err){
  console.error(err);
  alert("Error order");
 }
});

// SELLER
document.getElementById("sellerForm").addEventListener("submit", async e=>{
 e.preventDefault();

 try{
  const name = document.getElementById("sellerName").value;
  const phone = document.getElementById("sellerPhone").value;
  const location = document.getElementById("sellerLocation").value;

  await addDoc(collection(db,"sellers"),{
    name, phone, location,
    createdAt: serverTimestamp()
  });

  alert("Seller registered");
  e.target.reset();

 }catch(err){
  alert("Error seller");
 }
});
</script>

</body>
</html>
