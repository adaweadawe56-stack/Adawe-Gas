<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adawe Gas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {font-family: Arial;margin:0;}
.navbar {background:#0b7a3c;}
.navbar-brand,.nav-link {color:white!important;}
.hero{background:#28a745;color:white;padding:140px 0;}
.btn-main{background:white;color:#28a745;font-weight:bold;padding:12px 25px;border-radius:8px;text-decoration:none;}
.section{padding:60px 0;}
.card-modern{background:white;padding:25px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
footer{background:#0b7a3c;color:white;padding:20px;text-align:center;}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
<div class="container">
<a class="navbar-brand">Adawe Gas</a>

<button class="navbar-toggler bg-white" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
<li class="nav-item"><a class="nav-link" href="#order">Order</a></li>
<li class="nav-item"><a class="nav-link" href="#seller">Seller</a></li>
<li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
</ul>
</div>
</div>
</nav>

<!-- HERO -->
<section class="hero" id="home">
<div class="container">
<h1>Fast & Reliable Gas Delivery</h1>
<p>Order gas instantly across Kenya</p>
<a href="#order" class="btn btn-main">Order Now</a>
</div>
</section>

<!-- ORDER -->
<section class="section" id="order">
<div class="container">
<h2 class="text-center mb-4">Place Order</h2>

<form id="orderForm" class="col-md-6 mx-auto card-modern">

<input id="name" class="form-control mb-3" placeholder="Name" required>
<input id="phone" class="form-control mb-3" placeholder="Phone" required>
<input id="location" class="form-control mb-3" placeholder="Location" required>
<input id="quantity" type="number" class="form-control mb-3" placeholder="Quantity" required>

<select id="brand" class="form-select mb-3" required>
<option value="">Select Brand</option>
<option>K-Gas</option>
<option>AfriGas</option>
<option>Pro Gas</option>
<option>TotalEnergies</option>
<option>Hashi Gas</option>
<option>Lake Gas</option>
<option>Rubis Gas</option>
<option>Taifa Gas</option>
</select>

<button class="btn btn-success w-100">Send Order</button>

<a id="whatsappBtn" target="_blank" class="btn w-100 mt-2" style="background:#25D366;color:white;">
📲 WhatsApp Order
</a>

<p id="trackingNumber" class="mt-3 text-success fw-bold"></p>

</form>
</div>
</section>

<!-- SELLER -->
<section class="section" id="seller">
<div class="container">
<h2 class="text-center mb-4">Register Seller</h2>

<form id="sellerForm" class="col-md-6 mx-auto card-modern">

<input id="sellerName" class="form-control mb-3" placeholder="Company Name" required>

<button type="button" onclick="getLocation()" class="btn btn-secondary w-100 mb-3">
Detect Location
</button>

<input id="sellerPrice6" type="number" class="form-control mb-3" placeholder="6kg Price">
<input id="sellerPrice13" type="number" class="form-control mb-3" placeholder="13kg Price">

<button class="btn btn-primary w-100">Register</button>

</form>
</div>
</section>

<!-- CONTACT -->
<section class="section bg-light text-center" id="contact">
<h2>Contact</h2>
<p>📞 0727 015 434</p>
<p>📧 adaweadawe56@gmail.com</p>
<p>📍 Nairobi, Kenya</p>
</section>

<footer>
<p>© 2026 Adawe Gas</p>
</footer>

<!-- FLOAT WHATSAPP -->
<a href="https://wa.me/254727015434"
style="position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:14px;border-radius:50px;text-decoration:none;">
WhatsApp
</a>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// FULL CONFIG
const firebaseConfig = {
 apiKey: "AIzaSyBVhASqIXG5OaVk1nr8c3hZ-_liTg1UIsw",
 authDomain: "adawe-gas-system-82187.firebaseapp.com",
 projectId: "adawe-gas-system-82187",
 storageBucket: "adawe-gas-system-82187.appspot.com",
 messagingSenderId: "644303663526",
 appId: "1:644303663526:web:bacf9e5db0d7787f705f67"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// TRACKING
function generateTracking(){
 return "AG"+Math.floor(100000+Math.random()*900000);
}

// LOCATION
let sellerLat=null, sellerLng=null;

window.getLocation = function(){
 navigator.geolocation.getCurrentPosition(pos=>{
  sellerLat = pos.coords.latitude;
  sellerLng = pos.coords.longitude;
  alert("Location detected");
 });
}

// ORDER SYSTEM
document.getElementById("orderForm").addEventListener("submit", async function(e){
 e.preventDefault();

 const name = document.getElementById("name").value.trim();
 const phone = document.getElementById("phone").value.trim();
 const location = document.getElementById("location").value.trim();
 const quantity = document.getElementById("quantity").value;
 const brand = document.getElementById("brand").value;

 if(!name || !phone || !location || !quantity || !brand){
  alert("Fill all fields");
  return;
 }

 const tracking = generateTracking();

 await addDoc(collection(db,"orders"),{
  name, phone, location,
  quantity:parseInt(quantity),
  brand,
  tracking,
  status:"Pending",
  createdAt:new Date()
 });

 document.getElementById("trackingNumber").innerText = "Tracking: "+tracking;

 window.open(`https://wa.me/254727015434?text=${encodeURIComponent(
`New Order:
Name:${name}
Phone:${phone}
Location:${location}
Qty:${quantity}
Brand:${brand}
Tracking:${tracking}`
 )}`);

 this.reset();
});

// WHATSAPP BUTTON
document.getElementById("whatsappBtn").addEventListener("click",function(){
 const name = document.getElementById("name").value;
 const phone = document.getElementById("phone").value;
 const location = document.getElementById("location").value;
 const quantity = document.getElementById("quantity").value;
 const brand = document.getElementById("brand").value;

 if(!name||!phone||!location||!quantity||!brand){
  alert("Fill form first");
  return;
 }

 this.href = `https://wa.me/254727015434?text=${encodeURIComponent(
`New Order:
Name:${name}
Phone:${phone}
Location:${location}
Qty:${quantity}
Brand:${brand}`
 )}`;
});

// SELLER SYSTEM
document.getElementById("sellerForm").addEventListener("submit", async function(e){
 e.preventDefault();

 const name = document.getElementById("sellerName").value.trim();
 const price6 = document.getElementById("sellerPrice6").value;
 const price13 = document.getElementById("sellerPrice13").value;

 if(!sellerLat || !sellerLng){
  alert("Click Detect Location first");
  return;
 }

 await addDoc(collection(db,"sellers"),{
  name,
  price6: price6 ? parseInt(price6) : null,
  price13: price13 ? parseInt(price13) : null,
  lat: sellerLat,
  lng: sellerLng,
  status:"pending",
  createdAt:new Date()
 });

 alert("Seller Registered");
 this.reset();
 sellerLat=null;
 sellerLng=null;
});
</script>

</body>
</html>
