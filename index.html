<!-- ===== ORDER FORM ===== -->
<section class="section bg-light" id="order">
  <div class="container">
    <h2 class="text-center">Place Order</h2>
    <form id="orderForm" class="col-md-6 mx-auto">
      <input class="form-control mb-2" id="name" placeholder="Name" required>
      <input class="form-control mb-2" id="location" placeholder="Location" required>
      <input class="form-control mb-2" id="quantity" type="number" placeholder="Quantity" required>
      <select class="form-select mb-2" id="unit" required>
        <option value="">Select Unit</option>
        <option>Kgs</option>
        <option>Cylinder(s)</option>
      </select>
      <select class="form-select mb-3" id="brand" required>
        <option value="">Select Gas Brand</option>
        <option>K-Gas</option>
        <option>AfriGas</option>
        <option>Pro Gas</option>
        <option>TotalEnergies</option>
      </select>
      <button type="submit" class="btn btn-success w-100">Send Order</button>
    </form>
  </div>
</section>

<!-- ===== SELLER REGISTRATION ===== -->
<section class="section" id="seller">
  <div class="container">
    <h2 class="text-center">Register as Gas Seller</h2>
    <form id="sellerForm" class="col-md-6 mx-auto">
      <input class="form-control mb-2" id="sname" placeholder="Company Name" required>
      <input class="form-control mb-2" id="slocation" placeholder="Location" required>
      <input class="form-control mb-2" id="sphone" placeholder="Phone" required>
      <select class="form-select mb-3" id="stype" required>
        <option value="">Select Business Type</option>
        <option value="Wholesale">Wholesale</option>
        <option value="Retail">Retail</option>
        <option value="Wholesale & Retail">Wholesale & Retail</option>
      </select>
      <button type="submit" class="btn btn-primary w-100">Register Seller</button>
    </form>
  </div>
</section>

<!-- ===== NEAREST GAS SELLERS (MAP) ===== -->
<section class="section" id="nearest-sellers">
  <div class="container">
    <h2 class="text-center">Nearest Gas Sellers</h2>
    <iframe
      width="100%"
      height="400"
      style="border:0"
      loading="lazy"
      allowfullscreen
      src="https://www.google.com/maps?q=Nairobi&output=embed">
    </iframe>
  </div>
</section>

<!-- ===== CONTACT ===== -->
<section class="section bg-light" id="contact">
  <div class="container text-center">

    <p>📞 0727 015 434</p>
    <p>📍 Nairobi, Kenya</p>
  </div>
</section>
