<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adawe Gas - Premium LPG Delivery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial, sans-serif; scroll-behavior: smooth; }
.navbar { background: #0f7b3f; }
.navbar a { color: white !important; font-weight: bold; }
.hero { background: linear-gradient(135deg,#0f5132,#198754); color: white; text-align:center; padding:100px 20px; }
.section { padding:60px 20px; }
.footer { background:#0f7b3f; color:white; padding:20px; text-align:center; }
.review-card { background:#f4f4f4; padding:20px; margin:10px 0; border-radius:8px; }
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand text-white" href="#">Adawe Gas</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#order">Order</a></li>
        <li class="nav-item"><a class="nav-link" href="#dashboard">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Fast & Reliable LPG Delivery</h1>
  <p>Across Kenya</p>
  <a href="#order" class="btn btn-light">Order Now</a>
</section>

<!-- ORDER -->
<section class="section bg-light" id="order">
  <div class="container text-center">
    <h2>Place Order</h2>
    <form id="orderForm">
      <input class="form-control mb-2" id="name" placeholder="Name" required>
      <input class="form-control mb-2" id="location" placeholder="Location" required>
      <input class="form-control mb-2" id="quantity" type="number" placeholder="Quantity" required>
      <select class="form-select mb-2" id="unit">
        <option>Cylinder(s)</option>
        <option>Kgs</option>
      </select>
      <button class="btn btn-success">Send via WhatsApp</button>
    </form>
  </div>
</section>

<script>
document.getElementById("orderForm").addEventListener("submit", function(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const location = document.getElementById("location").value;
  const quantity = document.getElementById("quantity").value;
  const unit = document.getElementById("unit").value;

  const message = Hello Adawe Gas,%0AOrder: ${quantity} ${unit}%0AName: ${name}%0ALocation: ${location};

  window.open(https://wa.me/254727015434?text=${message}, "_blank");
});
</script>

<!-- DASHBOARD -->
<section class="section" id="dashboard">
  <div class="container text-center">
    <h2>Top Partners</h2>
    <table class="table">
      <thead>
        <tr><th>#</th><th>Partner</th><th>Orders</th></tr>
      </thead>
      <tbody id="topPartners"></tbody>
    </table>
    <canvas id="growthChart"></canvas>
  </div>
</section>

<script>
const SHEET_ID = "1ULLQtsovhUizcbSL0b0X1R-xuh5DDLTHpDT83-eV4ms";
const API_KEY = "AIzaSyBjGJ9yJSe7k3uVZ8JEoyIBotNEpyfZ9cc";
const RANGE = "Orders!A:B";

async function fetchData(){
  const url = https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${RANGE}?key=${API_KEY};
  const res = await fetch(url);
  const data = await res.json();
  return data.values.slice(1);
}

async function loadDashboard(){
  const data = await fetchData();
  const tbody = document.getElementById("topPartners");
  tbody.innerHTML = "";

  let orders = [];

  data.forEach((row,i)=>{
    tbody.innerHTML += <tr><td>${i+1}</td><td>${row[0]}</td><td>${row[1]}</td></tr>;
    orders.push(parseInt(row[1]));
  });

  new Chart(document.getElementById("growthChart"),{
    type:"line",
    data:{
      labels: orders.map((_,i)=>P${i+1}),
      datasets:[{label:"Orders",data:orders}]
    }
  });
}

loadDashboard();
</script>

<!-- CONTACT -->
<section class="section bg-light" id="contact">
  <div class="container text-center">
    <h2>Contact</h2>
    <p>📞 0727 015 434</p>
    <p>📧 adaweadawe56@gmail.com</p>
  </div>
</section>

<footer class="footer">
  <p>© 2026 Adawe Gas</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
