<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adawe Gas</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- MAP -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{font-family:'Poppins',sans-serif}
body{margin:0;background:#f7f9fb}

/* NAVBAR */
.navbar{background:#0b7a3c}
.navbar-brand,.nav-link{color:white!important}

/* HERO */
.hero{
background:linear-gradient(135deg,#28a745,#1e7f34);
color:white;
padding:140px 0;
border-bottom-left-radius:40px;
border-bottom-right-radius:40px;
}
.hero h1{font-size:42px;font-weight:700}

/* BUTTON */
.btn-main{
background:white;
color:#28a745;
padding:14px 30px;
border-radius:30px;
font-weight:600;
}

/* SECTION */
.section{padding:80px 0}

/* CARD */
.card-modern{
border:none;
border-radius:20px;
padding:30px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
background:white;
}

/* FORM */
.form-control,.form-select{
border-radius:12px;
padding:12px;
}

/* MAP */
#mapArea{height:400px;border-radius:20px}

/* FOOTER */
footer{background:#0b7a3c;color:white;padding:20px}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand">Adawe Gas</a>
</div>
</nav>

<!-- HERO -->
<section class="hero text-center">
<div class="container">
<h1>Fast & Reliable Gas Delivery</h1>
<a href="#order" class="btn btn-main mt-3">Order Now</a>
</div>
</section>

<!-- ORDER -->
<section class="section" id="order">
<div class="container">
<h2 class="text-center mb-4">Place Order</h2>

<form id="orderForm" class="col-md-6 mx-auto card-modern">
<input class="form-control mb-3" id="name" placeholder="Name" required>
<input class="form-control mb-3" id="phone" placeholder="Phone" required>
<input class="form-control mb-3" id="location" placeholder="Location" required>
<input class="form-control mb-3" id="quantity" type="number" placeholder="Quantity" required>

<select class="form-select mb-3" id="brand" required>
<option value="">Select Brand</option>
<option>K-Gas</option>
<option>AfriGas</option>
<option>Total</option>
</select>

<button class="btn btn-success w-100">Send Order</button>

<!-- WHATSAPP BUTTON -->
<a id="whatsappBtn" target="_blank" 
class="btn w-100 mt-2" 
style="background:#25D366;color:white;">
📲 Order via WhatsApp
</a>

<p id="trackingNumber" class="mt-3 text-success fw-bold"></p>
</form>

</div>
</section>

<!-- MAP -->
<section class="section">
<div class="container">
<h2 class="text-center mb-4">Map</h2>
<div id="mapArea"></div>
</div>
</section>

<footer class="text-center">
<p>© 2026 Adawe Gas</p>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// FIREBASE
const firebaseConfig={
  apiKey:"YOUR_KEY",
  projectId:"YOUR_ID"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

// TRACKING
function generateTracking(){
 return "AG"+Math.floor(100000+Math.random()*900000);
}

// ORDER + AUTO WHATSAPP
document.getElementById("orderForm").addEventListener("submit", function(e){
 e.preventDefault();

 const name=document.getElementById("name").value;
 const phone=document.getElementById("phone").value;
 const location=document.getElementById("location").value;
 const quantity=document.getElementById("quantity").value;
 const brand=document.getElementById("brand").value;

 if(!name||!phone||!location||!quantity||!brand){
  alert("Fill all fields");
  return;
 }

 if(quantity<=0){
  alert("Invalid quantity");
  return;
 }

 const tracking=generateTracking();

 // SAVE FIREBASE
 db.collection("orders").add({
  name,phone,location,quantity,brand,tracking,status:"Pending"
 })
 .then(()=>{
  document.getElementById("trackingNumber").innerText="Tracking: "+tracking;

  // WHATSAPP AUTO OPEN
  const msg=`New Order:
Name: ${name}
Phone: ${phone}
Location: ${location}
Qty: ${quantity}
Brand: ${brand}
Tracking: ${tracking}`;

  window.open(`https://wa.me/254727015434?text=${encodeURIComponent(msg)}`);

  document.getElementById("orderForm").reset();
 });
});

// WHATSAPP BUTTON CLICK
document.getElementById("whatsappBtn").addEventListener("click", function(){

 const name=document.getElementById("name").value;
 const phone=document.getElementById("phone").value;
 const location=document.getElementById("location").value;
 const quantity=document.getElementById("quantity").value;
 const brand=document.getElementById("brand").value;

 if(!name||!phone||!location||!quantity||!brand){
  alert("Fill form first");
  return;
 }

 const msg=`New Order:
Name: ${name}
Phone: ${phone}
Location: ${location}
Qty: ${quantity}
Brand: ${brand}`;

 this.href=`https://wa.me/254727015434?text=${encodeURIComponent(msg)}`;
});

// MAP
const map=L.map('mapArea').setView([-1.28,36.81],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
</script>

</body>
</html>
