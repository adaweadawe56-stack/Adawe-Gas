<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adawe Gas - Interactive Demo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f5f5f5; font-family:Arial; }
.card { border-radius:15px; }
.status { font-weight:bold; }
</style>
</head>

<body>

<div class="container py-4">

<h2 class="text-center mb-4">🚀 Adawe Gas - Interactive Demo</h2>

<div class="row">

<!-- USER PANEL -->
<div class="col-md-6">
<div class="card p-3 shadow">
<h5>User Panel</h5>

<input id="name" class="form-control mb-2" placeholder="Your Name">
<input id="location" class="form-control mb-2" placeholder="Location">
<select id="gas" class="form-control mb-2">
<option>6 Kg</option>
<option>13 Kg</option>
</select>

<button class="btn btn-success w-100" onclick="placeOrder()">Place Order</button>

</div>
</div>

<!-- ADMIN PANEL -->
<div class="col-md-6">
<div class="card p-3 shadow">
<h5>Admin Panel</h5>

<ul id="orders" class="list-group"></ul>

</div>
</div>

</div>

</div>

<script>

let sellers = [
  {name:"Ahmed Gas", location:"Nairobi", phone:"254700111222"},
  {name:"Kali Gas", location:"Mlolongo", phone:"254711333444"}
];

let orders = [];

function placeOrder(){
  let name = document.getElementById("name").value;
  let location = document.getElementById("location").value;
  let gas = document.getElementById("gas").value;

  if(!name || !location){
    alert("Fill all fields");
    return;
  }

  let seller = sellers[Math.floor(Math.random()*sellers.length)];

  let order = {
    id: Date.now(),
    name,
    location,
    gas,
    seller,
    status: "Pending"
  };

  orders.push(order);
  renderOrders();

  // simulate status updates
  setTimeout(()=>updateStatus(order.id,"Approved"),2000);
  setTimeout(()=>updateStatus(order.id,"On The Way"),4000);
  setTimeout(()=>updateStatus(order.id,"Delivered"),6000);
}

function updateStatus(id,newStatus){
  let order = orders.find(o=>o.id===id);
  if(order){
    order.status = newStatus;
    renderOrders();
  }
}

function renderOrders(){
  let list = document.getElementById("orders");
  list.innerHTML = "";

  orders.forEach(order=>{

    let whatsappMsg = `Hello ${order.seller.name}, New Order:\n${order.name}\n${order.location}\n${order.gas}`;
    let whatsappLink = `https://wa.me/${order.seller.phone}?text=${encodeURIComponent(whatsappMsg)}`;

    let li = document.createElement("li");
    li.className = "list-group-item";

    li.innerHTML = `
      <b>${order.name}</b> (${order.location})<br>
      Gas: ${order.gas}<br>
      Seller: ${order.seller.name}<br>
      Status: <span class="status text-primary">${order.status}</span><br><br>

      <a href="${whatsappLink}" target="_blank" class="btn btn-success btn-sm">WhatsApp Seller</a>
    `;

    list.appendChild(li);
  });
}

</script>

</body>
</html>
