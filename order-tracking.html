<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Track Order</title>

  <link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    body{
      font-family:Arial;
      padding:20px;
    }

    #orderStatus{
      margin-top:20px;
      padding:15px;
      background:#f3f3f3;
      border-radius:8px;
    }
  </style>
  
</head>
 
<body>

<h2>Track Your Order</h2>

<input
id="orderIdInput"
type="text"
placeholder="Enter Order ID">

<button id="trackBtn">
Track
</button>

<div id="progressTracker"></div>

<div
id="liveMap"
style="
width:100%;
height:350px;
margin-top:20px;
display:none;
border-radius:12px;">
</div>

<div id="orderStatus"></div>

<div id="receiptBox"></div>
<hr>

<h3>My Order History</h3>

<input
id="historyPhone"
type="text"
placeholder="Enter Phone Number">

<button id="historyBtn">
Load History
</button>

<div id="historyResults"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module" src="orderTracking.js"></script>

</body>
