<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seller Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
  background:#f5f5f5;
  font-family:Arial;
}

.login-box{
  max-width:400px;
  margin:80px auto;
  background:white;
  padding:30px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.dashboard{
  display:none;
  padding:20px;
}

.card-box{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  margin-bottom:20px;
}

</style>

</head>
<body>

<!-- LOGIN -->

<div class="login-box" id="loginPage">

<h2 class="text-center mb-4">
Seller Login
</h2>

<input type="email"
       id="email"
       class="form-control mb-3"
       placeholder="Email">

<input type="password"
       id="password"
       class="form-control mb-3"
       placeholder="Password">

<button onclick="login()"
        class="btn btn-success w-100">
Login
</button>

<p id="loginError"
   class="text-danger mt-3 text-center">
</p>

</div>

<div class="dashboard" id="dashboard">

  <h2>Seller Dashboard</h2>

  <button onclick="logout()"
          class="btn btn-danger">
    Logout
  </button>

 <div class="row mb-3">

  <div class="col-md-4">
    <div class="card-box text-center">
      <h3 id="totalOrders">0</h3>
      <p>Total Orders</p>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card-box text-center">
      <h3 id="pendingOrders">0</h3>
     <p>Active Orders</p>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card-box text-center">
      <h3 id="deliveredOrders">0</h3>
      <p>Delivered Orders</p>
    </div>
  </div>
  </div>
<div class="row mb-3">

  <div class="col-md-4">
    <div class="card-box text-center">
      <h3 id="totalRevenue">KES 0</h3>
      <p>Total Revenue</p>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card-box text-center">
      <h3 id="deliveryRate">0%</h3>
      <p>Delivery Rate</p>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card-box text-center">
      <h3 id="averageRating">0.0 ⭐</h3>
      <p>Average Rating</p>

      <small id="totalReviews">
        0 Reviews
      </small>
    </div>
  </div>

</div>


<div class="card-box">

  <h4>My Orders</h4>

  <select id="statusFilter"
          class="form-select mb-3">

    <option value="All">All Orders</option>
    <option value="Pending">Pending</option>
    <option value="Accepted">Accepted</option>
    <option value="On The Way">On The Way</option>
    <option value="Delivered">Delivered</option>
    <option value="Rejected">Rejected</option>

  </select>

  <div id="ordersTable"></div>

</div>
<div class="card-box">

  <h4>My Gas Prices</h4>

    <input id="price1kg" class="form-control mb-2" placeholder="1kg Price">
    <input id="price3kg" class="form-control mb-2" placeholder="3kg Price">
    <input id="price6kg" class="form-control mb-2" placeholder="6kg Price">
    <input id="price13kg" class="form-control mb-2" placeholder="13kg Price">
    <input id="price15kg" class="form-control mb-2" placeholder="15kg Price">
    <input id="price22kg" class="form-control mb-2" placeholder="22kg Price">
    <input id="price25kg" class="form-control mb-2" placeholder="25kg Price">
    <input id="price35kg" class="form-control mb-2" placeholder="35kg Price">
    <input id="price40kg" class="form-control mb-2" placeholder="40kg Price">
    <input id="price45kg" class="form-control mb-2" placeholder="45kg Price">
    <input id="price50kg" class="form-control mb-3" placeholder="50kg Price">

    <button
      onclick="savePrices()"
      class="btn btn-success">
      Save Prices
    </button>

  </div>

</div>

<script type="module">
import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
getDocs,
onSnapshot,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
getAuth,
signInWithEmailAndPassword,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVhASqIXG5OaVk1nr8c3hZ-_liTg1UIsw",
  authDomain: "adawe-gas-system-82187.firebaseapp.com",
  projectId: "adawe-gas-system-82187",
  storageBucket: "adawe-gas-system-82187.appspot.com",
  messagingSenderId: "644303663526",
  appId: "1:644303663526:web:bacf9e5db0d7787f705f67"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

let sellerPhone = null;
let sellerDocId = null;

const statusFilter =
document.getElementById("statusFilter");
  
/* LOGIN */

window.login = async function(){

  console.log("Login button clicked");

  try{

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    const userCredential =
    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

  document.getElementById("loginPage").style.display = "none";

document.getElementById("dashboard").style.display = "block";

if ("Notification" in window) {

  const permission =
  await Notification.requestPermission();

  console.log(
    "Notification permission:",
    permission
  );

  if(permission === "granted"){

    new Notification("Adawe Gas", {
      body: "✅ Notifications Enabled"
    });

  }

}
   const q = query(
  collection(db, "sellers"),
  where("email", "==", email)
);

const snap = await getDocs(q);

if (snap.empty) {

  document.getElementById("loginError").innerText =
  "Seller account not found";

  return;
}

const sellerData = snap.docs[0].data();

sellerDocId = snap.docs[0].id;
sellerPhone = sellerData.phone;

console.log("sellerPhone =", sellerPhone);
console.log("sellerDocId =", sellerDocId);

const prices = sellerData.prices || {};

document.getElementById("price1kg").value = prices["1kg"] ?? "";
document.getElementById("price3kg").value = prices["3kg"] ?? "";
document.getElementById("price6kg").value = prices["6kg"] ?? "";
document.getElementById("price13kg").value = prices["13kg"] ?? "";
document.getElementById("price15kg").value = prices["15kg"] ?? "";
document.getElementById("price22kg").value = prices["22kg"] ?? "";
document.getElementById("price25kg").value = prices["25kg"] ?? "";
document.getElementById("price35kg").value = prices["35kg"] ?? "";
document.getElementById("price40kg").value = prices["40kg"] ?? "";
document.getElementById("price45kg").value = prices["45kg"] ?? "";
document.getElementById("price50kg").value = prices["50kg"] ?? "";
loadOrders();
  }catch(err){

    console.error(err);

    document.getElementById("loginError").innerText =
    err.message;

  }

};
 

/* LOAD ORDERS */
function loadOrders(){

  console.log("sellerPhone =", sellerPhone);

  const q = query(
    collection(db,"orders"),
    where("sellerPhone","==",sellerPhone)
  );

  let firstLoad = true;

 onSnapshot(q, snap => {

  if (!firstLoad) {

    snap.docChanges().forEach(change => {

      if (change.type === "added") {

        console.log(
          "NEW ORDER DETECTED",
          change.doc.data()
        );

        if (Notification.permission === "granted") {

          new Notification("Adawe Gas", {
            body: "🔔 New LPG Order Received"
          });

        }

      }

    });

  }
    firstLoad = false;

    ordersTable.innerHTML = "";

    let total = 0;
    let pending = 0;
    let delivered = 0;
    let totalRevenue = 0;

    snap.forEach(docSnap => {

  const o = docSnap.data();

  const selectedStatus =
  statusFilter.value;

  if(
    selectedStatus !== "All" &&
    o.status !== selectedStatus
  ){
    return;
  }

 const badgeColor =
  o.status === "Pending" ? "bg-secondary" :
  o.status === "Accepted" ? "bg-primary" :
  o.status === "On The Way" ? "bg-warning" :
  o.status === "Delivered" ? "bg-success" :
  o.status === "Rejected" ? "bg-danger" :
  "bg-secondary";
      total++;

      if(
  o.status === "Pending" ||
  o.status === "Accepted" ||
  o.status === "On The Way"
){
  pending++;
}

     if(o.status === "Delivered"){

  delivered++;

  if(o.price){
    totalRevenue += Number(o.price);
  }

}
ordersTable.innerHTML += `
<div class="card p-3 mb-3">

  <h5>${o.name || ""}</h5>

  <p><b>Phone:</b> ${o.phone || ""}</p>

  <p><b>Location:</b> ${o.location || ""}</p>

  <p><b>Quantity:</b> ${o.quantity || ""}</p>

  <p>
    <span class="badge ${badgeColor}">
      ${o.status || "Pending"}
    </span>
  </p>

  <div class="d-flex gap-2 flex-wrap">

    <button
    onclick="updateStatus('${docSnap.id}','Accepted')"
    class="btn btn-primary btn-sm">
    Accept
    </button>

    <button
    onclick="updateStatus('${docSnap.id}','On The Way')"
    class="btn btn-warning btn-sm">
    On The Way
    </button>

    <button
    onclick="updateStatus('${docSnap.id}','Delivered')"
    class="btn btn-success btn-sm">
    Delivered
    </button>

    <button
    onclick="updateStatus('${docSnap.id}','Rejected')"
    class="btn btn-danger btn-sm">
    Reject
    </button>

  </div>

</div>
      `;
    });

    document.getElementById("totalOrders").innerText = total;
    document.getElementById("pendingOrders").innerText = pending;
    document.getElementById("deliveredOrders").innerText = delivered;
    document.getElementById("totalRevenue").innerText =
"KES " + totalRevenue.toLocaleString();

const deliveryRate =
total > 0
? Math.round((delivered / total) * 100)
: 0;

document.getElementById("deliveryRate").innerText =
deliveryRate + "%";
  });

}

/* UPDATE STATUS */

window.updateStatus = async function(id,status){

  await updateDoc(doc(db,"orders",id),{
    status
  });

};

/* LOGOUT */

window.logout = async function(){

  await signOut(auth);

  location.reload();

};

/* SAVE PRICES */

window.savePrices = async function(){

  if(!sellerDocId){
    alert("Seller not loaded");
    return;
  }

  const prices = {

    "1kg": Number(document.getElementById("price1kg").value || 0),
    "3kg": Number(document.getElementById("price3kg").value || 0),
    "6kg": Number(document.getElementById("price6kg").value || 0),
    "13kg": Number(document.getElementById("price13kg").value || 0),
    "15kg": Number(document.getElementById("price15kg").value || 0),
    "22kg": Number(document.getElementById("price22kg").value || 0),
    "25kg": Number(document.getElementById("price25kg").value || 0),
    "35kg": Number(document.getElementById("price35kg").value || 0),
    "40kg": Number(document.getElementById("price40kg").value || 0),
    "45kg": Number(document.getElementById("price45kg").value || 0),
    "50kg": Number(document.getElementById("price50kg").value || 0)

  };

  await updateDoc(
    doc(db,"sellers",sellerDocId),
    { prices }
  );

  alert("✅ Prices updated successfully");

};

</script>

</body>
</html>
