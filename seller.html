```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
  background:#f4f4f4;
  font-family:Arial;
}

.card{
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:15px;
}

input{
  margin-bottom:10px;
}

</style>

</head>
<body>

<div class="container mt-4">

<h2 class="mb-4">Seller Registration</h2>

<div class="card">

<input id="sellerName" class="form-control" placeholder="Business Name">

<input id="sellerEmail" class="form-control" type="email" placeholder="Email">

<input id="sellerPassword" class="form-control" type="password" placeholder="Password">

<button onclick="registerSeller()" class="btn btn-primary w-100">
Create Seller Account
</button>

</div>

<h2>Seller Dashboard</h2>

<div id="sellerOrders"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  updateDoc,
  setDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyBVhASqIXG5OaVk1nr8c3hZ-_liTg1UIsw",

  authDomain: "adawe-gas-system-82187.firebaseapp.com",

  projectId: "adawe-gas-system-82187",

  storageBucket: "adawe-gas-system-82187.appspot.com",

  messagingSenderId: "644303663526",

  appId: "1:644303663526:web:bacf9e5db0d7787f705f67"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const sellerOrders =
document.getElementById("sellerOrders");

window.registerSeller = async function(){

  const name = document.getElementById("sellerName").value;
  const email = document.getElementById("sellerEmail").value;
  const password = document.getElementById("sellerPassword").value;

  try {

    const userCredential =
    await createUserWithEmailAndPassword(auth,email,password);

    const user = userCredential.user;

    await setDoc(doc(db,"sellerAccounts",user.uid),{

      name:name,
      email:email,
      sellerId:user.uid,
      createdAt:new Date()

    });

    alert("Seller account created successfully!");

  } catch(error){

    alert(error.message);

  }

};

onSnapshot(collection(db,"orders"), snap=>{

 sellerOrders.innerHTML = "";

 snap.forEach(docSnap=>{

   const o = docSnap.data();

   const id = docSnap.id;

   if(!o.sellerName) return;

   sellerOrders.innerHTML += `

   <div class="card">

   <h5>${o.name}</h5>

   <p>${o.quantity}</p>

   <p>${o.location}</p>

   <p>Status: ${o.status}</p>

   <button onclick="markDelivered('${id}')"
   class="btn btn-success">

   Delivered

   </button>

   </div>
   `;
 });

});

window.markDelivered = async function(id){

 await updateDoc(doc(db,"orders",id),{

   status:"Delivered"

 });

};

</script>

</body>
</html>
```
