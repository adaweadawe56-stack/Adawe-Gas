<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Seller Login - Adawe Gas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#064e3b,#10b981);
      font-family:Arial,sans-serif;
    }

    .login-card{
      width:100%;
      max-width:420px;
      background:white;
      padding:35px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    .login-card h2{
      text-align:center;
      color:#064e3b;
      margin-bottom:25px;
      font-weight:bold;
    }

    .btn-login{
      background:#10b981;
      color:white;
      font-weight:600;
      border:none;
    }

    .btn-login:hover{
      background:#059669;
      color:white;
    }

    #toast{
      position:fixed;
      top:20px;
      right:20px;
      padding:15px 25px;
      border-radius:10px;
      color:white;
      font-weight:bold;
      display:none;
      z-index:9999;
    }

    .back-home{
      text-align:center;
      margin-top:15px;
    }

    .back-home a{
      color:#064e3b;
      text-decoration:none;
      font-weight:600;
    }

  </style>
</head>
<body>

<div class="login-card">

  <h2>Seller Login</h2>

  <form id="loginForm">

    <input
      type="email"
      id="email"
      class="form-control mb-3"
      placeholder="Email Address"
      required
    >

    <input
      type="password"
      id="password"
      class="form-control mb-3"
      placeholder="Password"
      required
    >

    <button
      type="submit"
      class="btn btn-login w-100"
      id="loginBtn"
    >
      Login
    </button>

  </form>

  <div class="back-home">
    <a href="index.html">← Back to Home</a>
  </div>

</div>

<div id="toast"></div>

<script type="module">

/* ---------------- FIREBASE ---------------- */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {
  apiKey: "AIzaSyBVhASqIXG5OaVk1nr8c3hZ-_liTg1UIsw",
  authDomain: "adawe-gas-system-82187.firebaseapp.com",
  projectId: "adawe-gas-system-82187",
  storageBucket: "adawe-gas-system-82187.appspot.com",
  messagingSenderId: "644303663526",
  appId: "1:644303663526:web:bacf9e5db0d7787f705f67"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);


/* ---------------- TOAST ---------------- */

function showToast(message, success = true){

  const toast = document.getElementById("toast");

  toast.innerText = message;

  toast.style.background = success ? "#10b981" : "#dc2626";

  toast.style.display = "block";

  setTimeout(() => {
    toast.style.display = "none";
  },3000);
}


/* ---------------- LOGIN ---------------- */

const loginForm = document.getElementById("loginForm");

const loginBtn = document.getElementById("loginBtn");

loginForm.addEventListener("submit", async(e)=>{

  e.preventDefault();

  const email = document.getElementById("email").value.trim();

  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    showToast("Fill all fields", false);
    return;
  }

  loginBtn.disabled = true;

  loginBtn.innerText = "Logging in...";

  try{

    await signInWithEmailAndPassword(auth,email,password);

    showToast("✅ Login successful");

    setTimeout(()=>{
      window.location.href = "seller-dashboard.html";
    },1500);

  }catch(error){

    console.error(error);

    showToast("❌ Invalid email or password", false);

  }finally{

    loginBtn.disabled = false;

    loginBtn.innerText = "Login";
  }

});

</script>

</body>
</html>
